# Local scratch cleanup. output/ is gitignored: every render drops its MP4 there
# and nothing auto-cleans it, so it grows unbounded (once hit 184 GB). run.py prunes
# video files older than this at the start of every local invocation; metadata/logs
# stay. Set to 0 to prune every video render; raise it to keep renders around longer.
output:
  video_retention_days: 7

brand:
  name: KiwinoyGamer
  handle: '@kiwinoygaming'
  language: English
  voice: 'High-energy gaming creator who lives and breathes gacha games and sports.
    Confident, hype, and in-the-know — talks to the audience like a friend with the
    inside scoop. Emoji-forward but never spammy. Value-first: always helps the viewer
    win, save, or look smart. Hooks hard in the first line.

    '
models:
  # Caption/beats writer. "claude_code" = your Claude subscription token (FREE),
  # "openai" = gpt-4.1 (paid), "anthropic" = Anthropic API key (paid).
  writer_provider: claude_code
  writer_openai: gpt-4.1
  writer_anthropic: claude-sonnet-4-6
  claude_model: sonnet           # model used for the free Claude Code calls
  research: gpt-4.1              # (unused now — image/reel research uses Claude)
  vision_openai: gpt-4.1        # OpenAI vision FALLBACK for the clip observer
  image: gpt-image-1            # IMAGE GENERATOR stays on OpenAI (paid)
  web_search_tool: web_search
  writer_max_tokens: 1024
schedule:
  timezone: UTC
  # GAMES-ONLY (2026-06-14): KiwinoyGamer focuses on games. Sports + esports moved
  # to a separate channel. Both feed image slots are the games rotation (category
  # 'gacha' = the general games/AAA rotation, NOT esports). These design over your
  # game media (curated photos / footage frames); with ai_fallback off they SKIP
  # when no game media exists yet, so upload game footage/photos to fill them.
  slots:
  - id: 1
    time: '08:00'
    category: gacha
  - id: 2
    time: '20:00'
    category: gacha
topics:
  # "gacha" = the games / Facebook + Instagram IMAGE rotation. Despite the key
  # name it now covers both gacha titles (anime art) AND major AAA titles (each
  # rendered in its own real art style via image.franchise_styles below).
  gacha:
    games:
    - Genshin Impact
    - 'Honkai: Star Rail'
    - NTE Neverness to Everness
    - Final Fantasy VII Revelation
    - Resident Evil Veronica
    - 'Halo: Campaign Evolved'
    angles:
    - Tier list / meta analysis — which characters or items are must-haves right now
