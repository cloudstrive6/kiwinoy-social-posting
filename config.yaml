    instagram: kg-instagram
    threads: kg-threads
    x: kg-xtwitter
    youtube: kg-youtube
  # Cached live IDs — only an OFFLINE fallback if Post for Me can't be reached at
  # run time. Normally ignored now (external_ids above are resolved live).
  accounts:
    facebook: spc_Jn3pb3dgrSYjYWuQGFlPy
    instagram: spc_0NB5IGe1TDn4uoZ2ICkbk
    threads: spc_zHmq0cy5TDEspiRsiyYZ
    x: spc_lka8e4mbEwgNwSrpmhfpF
    youtube: spc_s5pd0ql3jSt1ZGjYb7Axz

# Reels track. A SEPARATE cadence from the image posts: 2 short vertical videos
# a day. Each reel is a 12-15s 9:16 MP4 with Ken Burns motion + animated
# storytelling captions, rendered free with Remotion and published to IG/FB Reels.
reels:
  enabled: true
  # YouTube Shorts control for gameplay reels (separate from video_post_to). YouTube
  # throttled the channel's new-Short reach (6 auto-Shorts/day flagged as repetitive),
  # so (#4) PAUSED 2026-06-26: enabled=false -> no reel posts to YouTube at all.
  # On resume, set enabled=true and (#1) YouTube only posts on `slots` (2 of the 6
  # daily reel slots ~= 2/day) instead of every slot, to look less bulk/automated.
  youtube:
    # STOPPED 2026-07-03 (per user): the 1080p feed reels no longer go to YouTube via
    # Post for Me. YouTube Shorts move to a DEDICATED 4K/60 HDR track (classic <-> triptych
    # alternating) uploaded via the YouTube Data API (core/youtube.py) — see the
    # youtube_shorts section below. enabled=false = this PfM path is off.
    enabled: false
    slots: [1, 2, 3]       # legacy/reference only
  brand_badge: "KG"        # fallback text badge if no logo image is set
  brand_logo: "reels/assets/logo/KG Logo 2.PNG"  # on-screen channel logo (reels + graphics)
  brand_logo_opacity: 0.6  # top-right logo: circular-cropped, 60% opacity
  brand_logo_size: 116     # top-right logo diameter (px)
  # YouTube thumbnail fonts (headline box + 4K/HDR badge). Montserrat Black is the
  # default (biggest/boldest/most legible); long headlines auto-switch to condensed
  # Anton so they stay large. Both are the actual thumbnail text font.
  thumbnail:
    headline_font: assets/fonts/montserrat/Montserrat.ttf   # variable -> heaviest weight
    long_font: assets/fonts/anton/Anton-Regular.ttf         # condensed, for long titles
    long_threshold: 14                                      # chars over which to use the condensed font
    # Attention grade for the base image (make it pop, pull the eye to the subject):
    vibrance: 1.35     # colour saturation (1.0 = none; >1.5 starts to look cheap)
    contrast: 1.16
    brightness: 1.04
    clarity: 1.6       # sharpening / crispness
    bloom: 0.45        # soft glow on highlights (cinematic/premium; 0 = off)
    # Game LOGO (top-left) + GLOW/pop, MKIceAndFire-style (drop a game logo PNG in
    # reels/assets/game-logo/, matched to the game by filename keyword):
    logo_height: 168   # game-logo height on the 1280x720 thumbnail
    logo_glow: true    # adaptive backing behind the game logo (halo on dark bg, shadow on light)
    logo_shadow_blur: 10   # (bright bg) game-logo shadow softness
    logo_shadow_dark: 0.42 # (bright bg) game-logo shadow strength (subtle; never a 'box')
    logo_dark_lum: 120 # bg luminance below this -> white outline (else dark); keeps a dark logo legible
    logo_outline_px: 6     # thickness of the seamless logo outline (follows the shape, not a box)
    logo_outline_blur: 2.5 # soften the outline edge slightly
    logo_outline_passes: 2 # stack the outline (higher = stronger separation)
    text_glow: true    # soft glow/shadow behind the PART/FULL GAME box (pop)
    badge_opacity: 0.6 # 4K/HDR badge box: 0 = fully see-through, 1 = solid black
    # PROMINENT foreground character cutout (the #1 CTR lever). Drop transparent hero
    # PNGs in reels/assets/game-character/<game>/ (matched like the logos); the
    # thumbnail composites one BIG over a darkened scene so the subject is unmistakable.
    character_scale: 1.14  # height as a fraction of 720px; >1 => the body BLEEDS off the
                           # bottom edge so a chest/waist cut is never a visible flat line
    character_max_w: 0.6   # cap its width (fraction of 1280) so it never covers everything
    character_x: 0.63      # horizontal CENTRE of the character (0.63 = right-of-centre,
                           # keeps the face clear of the top-right 4K/HDR badge)
    character_top: 0.0     # head near the top; body runs off the bottom
    character_side: right  # which side the character stands on (logo+text take the other)
    character_bg_darken: 0.7   # darken the background (0-1) so the character pops (keep the bg vibrant)
    character_bg_sat: 0.9      # slightly desaturate the background too
    character_bg_blur: 2.5     # soften bg clutter (2nd character/HUD) -> subject in focus, bg recedes
    character_shadow: true # soft contact shadow so the cutout separates from the bg
    # SUBJECT grade — bright, vibrant + crisp like the MKIceAndFire samples. The cutout
    # is graded on its OWN (a dark gameplay-frame subject gets lifted), separate from the bg.
    subject_grade: true
    subject_target_lum: 140    # auto-lift the subject's mean brightness toward this
    subject_brightness_min: 0.9   # clamp the auto-lift (don't crush a good render)
    subject_brightness_max: 1.7   # clamp the auto-lift (don't blow out a bright frame)
    subject_contrast: 1.08
    subject_saturation: 1.05     # gentle — a big boost sunburns warm-lit skin
    subject_clarity: 1.2
    subject_rim: 0.32          # tight bright edge behind the subject (0-1) -> pops off the bg (subtle)
    subject_rim_px: 8
    subject_rim_blur: 5
    vignette: 0.38     # darken AWAY from the subject (pull the eye in)
    spotlight: 0.18    # brighten AT the subject (make it pop; 0 = off)
    auto_focus: true   # auto-find the subject (detail+colour); overridden by an explicit focus
    # Auto-composition: analyze each candidate + DECIDE the crop for max CTR — a
    # subject-aware cover-crop (off-centre characters aren't chopped) + a computed
    # zoom that pulls a small/far subject in to fill the frame (an already-full shot
    # is left alone). Overridden by an explicit focus/zoom on a variant spec.
    auto_compose: true
    auto_fill: 0.82    # zoom so the subject spans ~this fraction of the frame
    auto_zoom_min: 1.0 # never zoom out
    auto_zoom_max: 1.7 # cap the zoom-in so the subject is never cropped too tight
    pool_crop_bottom: 0.045   # trim the copyright strip off the bottom of cloud-pool stills
    variants: 3        # thumbnail variants generated per upload (for A/B Test & Compare)
    # Relevance: for a titled clip (Part N or a story moment) pull the thumbnail
    # BACKGROUND from the clip's OWN frames (relevant by construction) instead of the
    # random cloud pool. Full-game concats still use the curated pool (iconic shots).
    clip_bg_from_video: true
    # VISION judge (Phase 2): Claude Haiku rates each variant for relevance + scroll-
    # stopping and PICKS the best (~half a cent/thumbnail). Needs ANTHROPIC_API_KEY;
    # fails open to the free heuristic inspector on any error / no key.
    vision_judge: true
    vision_model: claude-haiku-4-5   # 1st choice (Anthropic)
    vision_openai_model: gpt-4o-mini # fallback if Anthropic errors/unfunded (OpenAI)
    cutout_auto: true                # no curated render? auto-cut the hero from the stills (rembg)
    cutout_model: u2net_human_seg    # isolates the PERSON (ignores HUD/scenery) — best for game heroes
    cutout_fallback_model: isnet-general-use  # retried when the human model finds nothing (non-human subject)
  duration_seconds: 14
  fps: 60          # render reels at 60fps end-to-end (smooth gameplay motion)
  width: 1080
  height: 1920
  shots: 3                 # background images generated per reel (cycled w/ Ken Burns)
  beats: 4                 # on-screen caption beats (hook -> build -> payoff -> CTA)
  music_dir: reels/assets/music   # drop royalty-free .mp3/.m4a here; silent if empty
  # Vertical background art for reels. NO baked-in text (Remotion adds the captions),
  # leave clean space. Style still matches the topic.
  background_size: 1024x1536
  background_prompt: >
    Vertical 9:16 background visual for a short social video. Bold single focal
    subject, cinematic, high contrast, designed to stop the scroll. Leave clean
    negative space in the lower third for caption text. NO text, NO words, NO
    letters, NO watermark, NO logos, NO UI anywhere in the image.
  # Reels are TAGLISH and aimed at the young Philippine audience.
  taglish: true
  # AI voiceover narration (ElevenLabs). Fail-open: if no key / disabled, reels
  # render music-only exactly as before. voice_id is tunable — pick a young,
  # energetic, Taglish-capable voice from your ElevenLabs library.
  narration:
    enabled: true
    voice_id: "okH1aHncYRU2dc9TP3hV"   # user's chosen Taglish reel voice
    model_id: "eleven_multilingual_v2"  # supports Filipino/Tagalog
    max_words: 34                        # ~12-14s of energetic VO
  # USE YOUR OWN GAMEPLAY FOOTAGE instead of AI-generated stills. Drop video
  # clips into reels/assets/footage/<game>/ (folders listed in `map` below). The
  # composer splices a few short clips (clip_seconds each) into each reel and
  # overlays the captions + Taglish voiceover + music. Landscape gameplay is
  # shown centered over a blurred fill so it fits the 9:16 frame. If no matching
  # footage exists, it falls back to AI background stills (so nothing breaks).
  # Use H.264 .mp4 clips for best compatibility. Keep the library modest in size
  # (it ships in the repo so the cloud renderer can use it).
  footage:
    enabled: true
    dir: reels/assets/footage
    # GAMES-ONLY: exclude esports titles from the footage reels (they moved to the
    # separate sports/esports channel). list_games() / the topic agent skip these.
    exclude: [mlbb, dota2, cs2, lol, asphalt, reanimal]   # asphalt/reanimal: archive-only, not in circulation yet (2026-07-05)
    # DOUBLE DOWN on Marvel's Spider-Man (2026-06-14, user): when any of these have
    # footage, the topic agent picks from them first. Empty/none-present = any game.
    prefer: [spider-man1, spider-man-miles-morales, spider-man2]
    # Spider-Man 2 ONLY on the FB/IG feed gameplay reel + Threads footage. UNTIL FURTHER
    # NOTICE (user, 2026-07-14): the far-future `until` makes this effectively indefinite
    # (the mechanism requires a date; it auto-reverts to `prefer` above only after `until`).
    # To switch games / resume rotation: change `games` or set `until` to a past date.
    # Resolved by CONFIG.preferred_footage_games(). TikTok is a separate forced-game track
    # (already spider-man2); YouTube unaffected.
    prefer_override:
      games: [spider-man2]
      until: "2099-12-31T23:59:59Z"
    # Large clips (>100MB, up to 2GB) live as assets on a GitHub Release instead
    # of in the repo (which caps files at 100MB). Upload them with:
    #   python tools/footage.py upload <game> <path-to-clip.mp4>
    # They're auto-discovered by their "<game>__" name prefix, downloaded at
    # render time into cache_dir, and merged with any local clips. Set
    # use_releases: false to turn this off.
    use_releases: true
    release_repo: cloudstrive6/kiwinoy-social-posting
    release_tag: footage
    cache_dir: reels/assets/footage/.cache
    clip_seconds: 4         # each clip is trimmed to ~this many seconds
    min_clips: 3
    max_clips: 4
    mute_clips: true        # mute game audio so the voiceover + music stay clean
    # topic -> subfolder (first keyword match wins; 'general' is the catch-all)
    map:
    - {match: ['mobile legends', 'mlbb', 'mpl'], dir: mlbb}
    - {match: ['dota'], dir: dota2}
    - {match: ['counter-strike', 'counter strike', 'cs2', 'csgo'], dir: cs2}
    - {match: ['league of legends', 'wild rift', 'worlds', 'msi'], dir: lol}
    - {match: ['genshin'], dir: genshin}
    - {match: ['honkai', 'star rail'], dir: hsr}
    - {match: ['neverness', 'nte'], dir: nte}
    - {match: ['final fantasy', 'ff7', 'ffvii'], dir: ff7}
    - {match: ['resident evil', 'veronica'], dir: re}
    - {match: ['halo', 'master chief'], dir: halo}
    - {match: ['last of us', 'tlou', 'ellie', 'abby', 'naughty dog'], dir: thelastofus2}
    - {match: ['miles morales'], dir: spider-man-miles-morales}
    - {match: ['spider-man 2', 'spiderman 2', 'spider-man2'], dir: spider-man2}
    - {match: ['spider-man', 'spiderman', 'spider man', 'peter parker', 'insomniac'], dir: spider-man1}
  # Pretty display names for footage folder keys (used in titles + voiceovers).
  game_names:
    mlbb: 'Mobile Legends: Bang Bang'
    dota2: 'Dota 2'
    cs2: 'Counter-Strike 2'
    lol: 'League of Legends'
    genshin: 'Genshin Impact'
    hsr: 'Honkai: Star Rail'
    nte: 'Neverness to Everness'
    ff7: 'Final Fantasy VII'          # the ORIGINAL PS1 game
    ff7remake: 'Final Fantasy VII Remake'
    re: 'Resident Evil'
    halo: 'Halo'
    thelastofus2: 'The Last of Us Part II'
    spider-man1: "Marvel's Spider-Man"
    spider-man-miles-morales: "Marvel's Spider-Man: Miles Morales"
    spider-man2: "Marvel's Spider-Man 2"
    general: 'this game'
  # ONE fitting emoji per game. Used for the GAME-TITLE line that sits between the
  # caption body and the hashtags on CLASSIC/TRIPTYCH reel captions (FB/IG/TikTok,
  # per user 2026-07-14):  <caption>\n\n<Game Title> <emoji>\n\n<hashtags>
  # Any game not listed falls back to the generic controller emoji.
  game_emoji:
    spider-man1: "🕸️"
    spider-man-miles-morales: "🕸️"
    spider-man2: "🕸️"
    ff7: "⚔️"
    ff7remake: "⚔️"
    thelastofus2: "🍄"
    re: "🧟"
    halo: "🪖"
    mlbb: "⚔️"
    dota2: "⚔️"
    cs2: "🔫"
    lol: "⚔️"
    genshin: "✨"
    hsr: "🌌"
    nte: "🌆"
  # Footage/game key -> cloud image-pool FOLDER key, when they differ (the pool is
  # keyed by the assets/images/<folder> name). Without this the triptych top panel +
  # thumbnail stills can't find the game's images and fall back to a clip frame.
  image_pool_map:
    thelastofus2: thelastofuspart2        # game key 'thelastofus2' -> images under 'thelastofuspart2'
    thelastofus1: thelastofusremastered
  # 2-3 super-relevant hashtags per game for SHORT reel/video captions (content
  # .run_short). Keep it tight - never a wall of tags.
  game_hashtags:
    spider-man1: ["#MarvelsSpiderManRemastered", "#SpiderMan", "#SpiderManPS5", "#marvel", "#gamingreels"]
    spider-man-miles-morales: ["#MarvelsSpiderManMilesMorales", "#SpiderManMilesMorales", "#SpiderMan", "#PS5", "#gamingreels"]
    spider-man2: ["#SpiderMan2", "#MarvelsSpiderMan2", "#SpiderMan", "#PS5", "#gamingreels"]
    ff7: ["#FF7", "#FinalFantasyVII", "#FF7Rebirth", "#FinalFantasy", "#gaming"]
    ff7remake: ["#FF7Remake", "#FinalFantasyVIIRemake", "#FinalFantasy", "#FF7", "#gaming"]
    thelastofus2: ["#thelastofuspart2", "#thelastofus", "#TLOU2", "#PS5", "#gaming"]
    thelastofus1: ["#thelastofus", "#TLOU", "#thelastofusremastered", "#PS5", "#gaming"]
    halo: ["#Halo", "#MasterChief", "#Xbox", "#gaming", "#gamingreels"]
    re: ["#ResidentEvil", "#RE", "#survivalhorror", "#gaming", "#PS5"]
    genshin: ["#GenshinImpact", "#Genshin", "#gaming", "#gachagame", "#gamingreels"]
    hsr: ["#HonkaiStarRail", "#StarRail", "#HSR", "#gaming", "#gachagame"]
    mlbb: ["#MobileLegends", "#MLBB", "#MobileLegendsBangBang", "#gaming", "#esports"]
  # Burned-on caption styling for the ffmpeg gameplay/commentary reels (Gameranx
  # style): a bold hook bar up top + synced white subtitles at the bottom.
  caption:
    font: 'DejaVu Sans'   # installed on the CI runner; libass resolves by name
    hook_size: 64
    sub_size: 52
    hook_margin_v: 200    # hook offset from top: clears the phone UI, sits low in
                          # the band (a touch into the footage top edge is fine)
    sub_margin_v: 430     # commentary subtitle offset from BOTTOM: lower-third but
                          # above the animated logo so they never overlap
    music_duck: 0.08      # base music bed level under the voiceover (lowered:
                          # music was competing with the narrator). It is ALSO
                          # sidechain-ducked by the voice, so it dips further
                          # whenever the narrator speaks and returns in the gaps.
    vo_gain: 1.0          # narrator volume (kept full; raise slightly if needed)
  # GAMEPLAY-ONLY reels: one standalone gameplay clip with a static hook caption
  # on top, the game's own audio kept, NO voiceover. Short Reel.
  # Dedicated TikTok track (separate from the multi-game FB/IG/Threads/YT reels):
  # posts ONLY the game below to TikTok (via Zernio), alternating classic<->triptych
  # on that game's own used-clip count. Run: `python run.py --tiktok --slot N`.
  tiktok:
    game: spider-man2    # Marvel's Spider-Man 2 (switched from TLOU2 2026-07-05 per user —
                         # TLOU2 gameplays paused on TikTok; SM2 footage synced to the release).
    extra_hashtags: ["#gaming"]   # appended to the TikTok caption ONLY (per user, 2026-07-06)
    posts_per_day: 3     # reference; actual firing = cron-job.org. 3/day EQUALLY SPACED
                         # (every 8h): 07:00 / 15:00 / 23:00 NZ (Pacific/Auckland). Raised
                         # 2->3 (2026-07-14, user). WATCH the pending-draft cap: every PfM
                         # TikTok post is a MANUAL-publish draft, and TikTok rejects a 6th
                         # PENDING share in 24h (spam_risk_too_many_pending_share) — at 3/day
                         # keep the draft inbox published down to <=4 or a run will fail.
    # EXPORT/ENCODE: true = render TikTok with the user's exact Premiere spec (2026-07-07):
    # H.264 High@4.2, Rec.709 SDR, VBR 2-PASS target 15 / max 20 Mbps, Max Render Quality,
    # AAC 320k (see _v_encode(hi)/_encode_final two_pass). false = same as the FB/IG/Threads
    # feed encode (CRF21 / veryfast / AAC 160k).
    hi_bitrate: true
  # Duration policy (per user 2026-07-11): post the WHOLE footage clip, capped at each
  # platform's max. If the clip is longer than a platform's cap, trim to that cap. 0 = no
  # cap (post the full clip). Feed logic: clip <= 5 min -> one shared render; > 5 min ->
  # split (Threads 5-min / IG up-to-15 / FB full).
  platform_max_seconds:
    facebook: 0        # no hard cap since June 2025 -> full clip
    instagram: 180     # 3 min. Meta's Reels ingestion FAILED to process a 3.5-min/517 MB
                       # reel ("Failed to process video media"); 180s keeps files small enough
                       # to ingest reliably + is IG's reach-favoured range. Lowered from 900.
    threads: 180       # 3 min (same Meta processing limit; was 300)
    tiktok: 3600       # 60 min (effectively full)
    youtube: 180       # 3 min (Shorts; longer = a normal long-form video, not a Short)
    absolute_max: 3600 # hard ceiling on the main render so a bad file can't render for hours
  # FB + IG STORY reach-booster cap: Stories reject video > 60s ("Duration ... is greater
  # than the maximum allowed duration of 60 seconds", page-stories-api). The main reel is
  # reposted to FB/IG Stories, so it's trimmed to this before the Story post (0 = no cap).
  story_max_seconds: 60
  gameplay:
    enabled: true
    # Alternate the reel LAYOUT per slot (1-6) so the channel isn't 6x the same
    # look each day — format variety helps avoid platform spam-detection.
    #   classic  = footage crop-filled vertical + hook bar + logos (original).
    #   triptych = 3 panels: top still+hook / middle UNCROPPED gameplay / bottom
    #              game key art (drop art in art_dir/<game>/).
    #   rotated  = the landscape gameplay ROTATED 90° CW into 9:16 (the "as-is"
    #              rotated look), KG logo upright top-right, no hook bar.
    # FB / Threads / YouTube alternate classic <-> triptych (via the used-clip
    # counter). 'rotated' is INSTAGRAM-EXCLUSIVE (per user 2026-07-01): IG shows it
    # ~every 3rd reel as its own IG-only post, so IG's daily posts cycle all three
    # while the other platforms never get the sideways look. A game with no art falls
    # back to classic for its triptych turn.
    layouts: [classic, triptych, fill, rotated]
    # FILL = full-bleed vertical (new 2026-07-03): raw LANDSCAPE clips you paste into a
    # DEDICATED per-game folder, scaled to COVER the whole 9:16 frame (centre-crop, no
    # bands/logo/text — pure footage). Original game audio + the 1080p reels' volume
    # boost. Generic GAME caption + 3-5 hashtags; Threads = #GamingThreads only. Uses the
    # FULL clip (paste <=3 min). Footage lives under its own key '<game>-vertical' so it
    # never mixes with the short composited clips:
    #   paste raw landscape ->  reels/assets/footage/<game>-vertical/
    #   then sync to CI     ->  python tools/footage.py sync <game>-vertical
    vertical:
      key_suffix: "-vertical"   # footage key/folder suffix for the fill pool
      max_seconds: 180          # use the FULL clip up to this (IG/YT Shorts cap = 3 min)
      volume_db: 8.26           # +dB gain on the original audio, matching the 1080p reels
    # Also repost every gameplay reel to the Instagram STORY (placement=stories) as a
    # reach-booster (2026-07-01, per user). Best-effort: never sinks the main post.
    ig_stories: true
    fb_stories: true   # also repost the reel to the Facebook Page Story (2026-07-02)
    art_dir: reels/assets/game-art
    # Darken the triptych TOP still (like the quote cards) so the hook caption
    # dominates. 1.0 = no change, lower = darker; 0.55 ~= a 45% black overlay.
    triptych_top_dim: 0.55
    # Lowkey "KIWINOYGAMING" wordmark at the bottom-centre of the triptych TOP panel
    # (Tarrget font). Simple + understated so it doesn't fight the hook.
    triptych_wordmark:
      enabled: true
      text: "KIWINOYGAMING"
      font: assets/fonts/tarrget-font/TarrgetRegular-WEOz.otf
      size: 40
      opacity: 0.82
      bottom_offset: 22   # px above the bottom edge of the top panel
    # Moving glow on the bottom game-art: a big SOFT round light that wanders around
    # so the art's own highlights/edges/text shimmer as it passes (a moving
    # reflection, not a visible band). Set enabled:false to turn it off.
    triptych_glow:
      enabled: true
      size: 620           # tile size in px (room for the soft tail to fade out)
      feather: 6.0        # softness of the fade; higher = NO visible edge/ring
      intensity: 0.58     # how strongly it lifts the highlights (a touch stronger)
      sway: 0.38          # how far the light wanders across the panel (0..~0.5)
      speed: 0.65         # wander speed; 1.0 = base, <1 = slower/more elegant
      dual: true          # a 2nd light mirrored on the opposite side of the panel
    # Each reel randomly picks ONE of these as its max length, for variety. The
    # actual length = min(picked value, the clip's own length). <=90s publishes
    # as a Reel/Short everywhere; >90s auto-routes as a long video on Facebook
    # (FB Reels caps ~90s) while staying a Reel on IG + a Short on YouTube.
    target_seconds_choices: [60, 90, 120, 170]
    target_seconds: 75    # fallback if target_seconds_choices is empty/unset
    fps: 60               # keep gameplay smooth
    # 9:16 frame (1080x1920) with the footage CROP-FILLED into a band, placed
    # top_band px from the top. The TALLER top band holds the hook BELOW the
    # phone's status bar / app UI (which overlays the very top), so the hook never
    # gets clipped; the remaining bottom band holds the animated logo.
    width: 1080
    height: 1920
    top_band: 320         # black band above the footage (hook lives here)
    footage_height: 1440  # 3:4 gameplay region (bottom band = 1920-320-1440 = 160)
  # Visual enhancement applied to the gameplay footage (not the black bands) so
  # clips look their crisp, vivid best. Subtle on purpose — over-grading looks
  # fake. Tune any value; set enabled:false to ship the raw look.
  grade:
    enabled: true
    contrast: 1.06      # >1 deepens blacks / pops the image
    brightness: 0.0     # -1..1; keep ~0 so highlights don't blow out
    saturation: 1.12    # >1 richer colour (Spidey reds/blues pop)
    gamma: 1.0          # <1 darkens mids, >1 lifts shadows
    sharpen: 0.8        # luma unsharp amount (0 = off); crisper edges
    denoise: 0          # >0 (e.g. 2-4) cleans compression noise but softens
  # Animated KiwinoyGaming lower-third logo (bottom-centre) for agent-made reels.
  # Source .mov is huge + VP9/VP8 alpha was unreliable in this ffmpeg, so it's two
  # small H.264 streams (RGB + alpha matte) recombined with alphamerge at render.
  logo_animated:
    enabled: false        # DROPPED 2026-06-27 (per user) — no animated logo on any
                          # reel/video. Flip true to bring it back.
    rgb: reels/assets/logo/kiwinoy_logo_rgb.mp4
    alpha: reels/assets/logo/kiwinoy_logo_alpha.mp4
    # The KiwinoyGaming Logo Reveal (8s), white background keyed out -> transparent.
    # It starts AFTER the first 4s of the reel, plays its reveal, then fades at the
    # end. (Source .mov is huge + git-ignored; this is the processed rgb+alpha pair.)
    scale: 0.66           # compact badge (smaller than before)
    bottom_margin: 200    # lower third, in the band over the subject's body: clears
                          # YouTube's bottom UI AND the in-game subtitle line (user-placed)
    start: 4.0            # delay: reveal begins 4s into the reel (per user)
    fade_start: 6.5       # begin fading out near the END of the 8s reveal
    fade_dur: 1.5         # fade-out duration
  # GAME logo overlay (top-centre, ABOVE the hook) on gameplay + commentary reels.
  # Drop a PNG per game in `dir`; it's matched to the game by filename keyword (e.g.
  # a file containing 'Spider-Man' is used for the Spider-Man games). Transparent
  # padding is auto-trimmed; kept above hook_margin_v so it never covers the hook.
  game_logo:
    dir: reels/assets/game-logo
    scale_w: 0.5          # max width as a fraction of the frame
    max_h: 160            # max height (clamped to stay above the hook)
    top_margin: 36        # px from the top edge
    # Explicit game-key -> logo filename. Wins over filename-keyword matching, which
    # can't disambiguate cases like FF7 ORIGINAL (PS1) vs FF7 REMAKE (the logos say
    # "7" vs "VII", so no keyword overlaps). Add an entry whenever two games share a
    # name root. Unmapped games still fall back to keyword matching.
    map:
      ff7: "Final Fantasy VII Original PS1 Logo.png"
      ff7remake: "Final-Fantasy-VII-Remake-Game-PNG-HD-Quality.png"
      thelastofus2: "The Last of Us Part 2 Remastered Game Logo.png"  # keyword match couldn't link the key to the filename
      # Spider-Man games share the "spider-man" root, so keyword matching can't tell them
      # apart (it grabbed the generic logo for SM2). Pin each explicitly (2026-07-06):
      spider-man1: "HD Marvel Spider Man Logo PNG - 2200x2200.png"
      spider-man-miles-morales: "spider-man-miles-morales logo.png"
      spider-man2: "Marvel's_Spider-Man_2.png"
  # COMMENTARY reels: a Taglish voiceover over gameplay b-roll with synced
  # subtitles. 'short' posts as a Reel; 'long' posts as a video feed post.
  commentary:
    enabled: false        # PAUSED (2026-06-29, user) — flip true to resume
    # Animated-logo placement for COMMENTARY reels only. These stay the ORIGINAL
    # low lower-third (FB-only) — the raised gameplay placement (logo_animated
    # bottom_margin 200) is a YouTube-Shorts fix and must NOT apply here.
    logo_animated:
      scale: 0.78         # original larger badge
      bottom_margin: 20   # sit low at the very bottom
      start: 4.0          # reveal begins 4s in (same as gameplay)
      fade_start: 6.5     # fade near the end of the 8s reveal
      fade_dur: 1.5
    short_seconds: 70
    medium_seconds: 150   # ~2.5 min
    long_seconds: 360     # ~6 min default; raise toward 900 (15 min) as desired
    # "Vary it" (per user): each scheduled run randomly picks one of these lengths.
    length_choices: [short, medium]
    post_to: [facebook]   # FB ONLY for now (separate from the gameplay reels' targets)
    fps: 30               # talking-over-broll; 30fps keeps render fast
    long_min_clips: 12    # a game needs >= this many clips to carry a long reel
    broll_seconds: 8      # max b-roll window taken from each clip (keeps it varied)
    broll_start_min: 3    # seek >= this many secs into each clip (skip menu/intro)
    max_clips: 30         # cap clips downloaded/used per reel (controls bandwidth)
    formats:
    - 'Top N ranking (rank moments / heroes / bosses, count down to #1)'
    - 'X Things You Must Do (practical tips a new player needs)'
    - 'Why this game / character hits different (a heartfelt or hyped take)'
    - 'Underrated moments most players miss'
    - 'Beginner mistakes to avoid'
    - 'A spoiler-free retrospective / love letter to the game'
  # READY REELS (2026-06-14, user): your OWN finished vertical reels (edited in
  # Premiere, Auto Reframed, branded). Drop them into reels/assets/ready/<game>/
  # named with the caption (e.g. "Fisk is caught.mp4"). `tools/ready_reels.py`
  # re-encodes them to 1080x1920 CFR 60 at a sane bitrate (solves the big-file
  # problem) and uploads them to the 'ready-reels' Release as a queue. The
  # ready-reels.yml workflow then posts the oldest one to FB/IG/Threads/YouTube
  # (short caption from the filename + 2-3 game hashtags) and removes it from the
  # queue. Captions/hashtags are NOT regenerated - they're your finished reels.
  ready_reels:
    enabled: true
    dir: reels/assets/ready
    release_tag: ready-reels
    size: 1080x1920
    fps: 60
    bitrate: "12M"      # re-encode target (your Premiere export is ~40 Mbps)
  # Recurring reel series formats (the script agent rotates through these by slot
  # so the feed builds familiar, returning-audience templates).
  formats:
  - 'Sino panalo? prediction (call the winner of a series/matchup with quick why)'
  - 'Hero/champion spotlight (why this pick is breaking the meta right now)'
  - 'Bracket reaction (react to the latest MPL/tournament result)'
  - 'Tier list / power ranking (rank the contenders fast)'
  - 'Meta shift alert (what the new patch changed and who it helps)'
  # 4 reels/day, all timed to Philippine peak scroll windows (PHT = UTC+8):
  #   04:25 UTC = 12:25 PM (lunch), 10:25 = 6:25 PM, 13:25 = 9:25 PM (prime),
  #   15:25 = 11:25 PM (late night). Esports reels are MLBB-led (focus) for the
  #   two evening-prime slots; one open esports + one gacha for variety.
  schedule:
    slots:
    # GAMEPLAY-ONLY, 3x/DAY (2026-07-01, user): reduced from 6 -> 3 reels/day (4+
    # clips/day splits engagement + risks reach throttling). The REAL cadence is set
    # by the EXTERNAL cron-job.org job (it POSTs slot 1 to reels.yml 3x/day); these
    # slots are reference. Evenly spaced every 8h (per user): 00/08/16 UTC = 8 AM /
    # 4 PM / 12 AM PHT. Each reel = a gameplay clip (classic/triptych to FB/Threads/
    # YouTube Short; IG also cycles the rotated look) + English hook + KG logo, plus
    # an IG Story repost. Footage-driven; skips if no footage. PHT = UTC+8.
    - id: 1
      time: '00:00'   # 8:00 AM PHT
      kind: gameplay
    - id: 2
      time: '08:00'   # 4:00 PM PHT
      kind: gameplay
    - id: 3
      time: '16:00'   # 12:00 AM PHT
      kind: gameplay

# Image-set posts: a daily post built from a large CURATED image set stored on a
# GitHub Release (e.g. your Final Fantasy VII Rebirth screenshots). Each run
# samples some images, the free vision picks a theme + 3-5 distinct images +
# a short caption, then they're enhanced and branded (KG logo top-right) and
# posted as a carousel/static to Facebook + Instagram. Upload a set with:
#   python tools/upload_images.py <bucket>   (creates release '<bucket>-images')
photoposts:
  enabled: true
  buckets:
  - ff7            # 1 Final Fantasy VII post/day
  sample_size: 24  # images sampled per run for the vision to choose from
  slides_min: 3
  slides_max: 5
  time: '14:00'    # UTC (one post/day)

# Carousel track: 2 multi-image posts/day (3-5 slides) to Facebook + Instagram.
# Slide 1 = scroll-stopping cover; middle slides each carry ONE idea (a rank, a
# stat, a matchup, a prediction) with short on-image text; last slide = CTA.
# Times picked for peak engagement: 13:00 UTC = 21:00 Philippines prime time
# (MPL/esports audience) ; 22:00 UTC = 18:00 US Eastern evening (games/gacha).
carousels:
  enabled: true
  slides_min: 3
  slides_max: 5
  size: 1024x1024
  schedule:
    slots:
    - id: 1
      time: '13:00'
      category: gacha

# Dedicated text track posting to Threads + X/Twitter. GAMES ONLY, text posts (no
# images/reels), <=280 chars (fits X's free limit AND Threads), storytelling +
# scroll-stopping hooks. Written by Claude via your Claude subscription
# (CLAUDE_CODE_OAUTH_TOKEN) so the high frequency costs nothing per token. Posts
# every 2 hours (cron in threads.yml); each run researches a fresh GAMES topic.
# Quote cards + a YouTube short (Facebook + IG + Threads/X + YouTube), 3x/day,
# evenly spread across 24h. EVERY post is a REAL, attributed quote from the
# footage's game universe (Spider-Man: games + films + comics). Life-general quotes
# were removed (per user) — it's all game/story now.
quotes:
  enabled: true
  # Per-day target (2x/day, 2026-07-01 per user), every 12h. The EXTERNAL cron-job.org
  # quotes job fires 06:00 + 18:00 UTC (2PM / 2AM PHT) — interleaved with the reels
  # (00/08/16) + footage (10/22) so FB/Threads posts stay ~2h+ apart. ALL 'story' = a
  # REAL, attributed quote from the footage's universe (curated core/game_quotes.py).
  daily_themes: {story: 2}
  story_universe: spider-man         # which universe the 'story' quotes come from
  # Quote MUSIC matches the game: drop tracks in
  # assets/background-music-for-quotes-videos/<game>/ -> uploaded as
  # qmusic__<game>__<file> and PREFERRED for that universe. Tracks left at the top
  # level stay a universal fallback (the current Spider-Man tracks live there).
  image_dir: assets/images          # pick the backdrop photo from here...
  prefer: [spider-man1, spider-man-miles-morales, spider-man2]   # ...preferring these
  exclude: [mlbb, sports]           # off-strategy folders to skip
  # PHOTO QUOTE CARDS only, 2x/day -> Facebook + Threads (2026-07-01, per user). The
  # IG quote REEL is STOPPED (IG now gets the 3 gameplay reels + Story instead) and X
  # is dropped from quotes. FB gets hashtags; Threads does not. youtube_short stays off.
  post_to: [facebook, threads]
  fb_stories: true   # also share the quote card to the Facebook Page Story (2026-07-02)
  hashtag_platforms: [facebook]                # FB card gets hashtags (not Threads)
  hashtags: ["#spiderman", "#gaming", "#marvel"]
  vision_pick: true                 # Claude vision picks the most cinematic photo
                                    # for the quote + skips title/menu/UI screens
  # YouTube can't take a static image, so the quote also goes there as a short,
  # loop-friendly VIDEO: the quote over spliced gameplay b-roll.
  youtube_short: false              # PAUSED (per user 2026-06-23): IG+YouTube quote
                                    # reels underperformed gameplay reels; FB/Threads/X
                                    # keep the static card. Set true to resume.
  short_seconds: 19                 # 19s reel (per user)
  short_per_clip: 3                 # ~3s per b-roll clip
  short_clips: 7                    # distinct clips to pull for the splice (~19/3)
  short_fps: 60                     # CFR 60fps (per user)
  music_dir: assets/background-music-for-quotes-videos  # dedicated quote music
  music_start_min: 0.30             # start the music mid-track (climax), randomised
  music_start_max: 0.65             # between these fractions of the track length
  # NOTE: image asset folders are currently sparse (few Spider-Man photos). When
  # they run out, the renderer falls back to a striking frame from gameplay
  # footage for variety. Add more photos to assets/images/<game>/ for best results.

threads_posts:
  enabled: true            # RESUMED (per user 2026-06-23): picking up traction.
                           # ENGAGEMENT-DRIVEN Threads/X track — replaces the old
                           # caption-only quotes that got no engagement.
  # A hashtag appended to every Threads caption (captions + footage) — a workaround
  # for Threads topics, which Post for Me can't set. On Threads a hashtag is
  # clickable like a topic. Set "" to disable.
  hashtag: "#GamingThreads"
  model: "sonnet"          # claude model alias used by the Threads agents
  max_chars: 280           # X (free) caps at 280; keeps every post valid on both
  category: games
  # ENGAGEMENT-FIRST: most posts are conversation-STARTERS that pull replies (the
  # Threads growth lever); ~update_ratio ride a trending gaming moment instead.
  update_ratio: 0.2
  engagement_formats: [this_or_that, would_you_rather, rank, hot_take, nostalgia, question, poll]
  # Franchises the conversation-starters are about (Spider-Man-weighted, our niche):
  subjects:
  - "Marvel's Spider-Man (the Insomniac games)"
  - "Marvel's Spider-Man 2"
  - "Spider-Man: Miles Morales"
  - "the Spider-Man movies (incl. Spider-Verse)"
  - "Final Fantasy VII (the compilation)"
  - "The Last of Us"
  - "Kingdom Hearts"
  - "Halo"
  # TRENDING-GAME FOCUS: instead of hopping between random games, each update post
  # rides the single hottest game / gaming moment of the period (a big new release,
  # a major update or patch, a viral moment, a showcase like the Game Awards) and
  # varies the angle WITHIN it. Builds topical authority + community. Auto-detected
  # each run via web search, so it stays on a marquee game for its run, then rolls
  # to the next big thing.
  trending_focus: true
  # AAA-ONLY, EXACT SCOPE (2026-06-14, user). Big-budget AAA only (no gacha / live-
  # service). Cover every entry WITHIN each franchise AS LISTED below - the bullets
  # define the exact scope (e.g. FF7 means ONLY the FF7 compilation, NOT other Final
  # Fantasy games). The agent surfaces whatever in this universe is hottest now.
  leagues:
  - "Marvel's Spider-Man: the games (Spider-Man 1, Miles Morales, Spider-Man 2) AND any upcoming Spider-Man movies"
  - "Marvel's Wolverine (Insomniac)"
  - "Final Fantasy VII ONLY (FF7 OG 1997, FF7 Remake, FF7 INTERmission, FF7 Rebirth, FF7 Revelation, FF7 Dirge of Cerberus, FF7 Advent Children) - NOT any other Final Fantasy"
  - "Kingdom Hearts: the games (KH 1, 2, 3, 4) AND any upcoming Kingdom Hearts games"
  - "Halo: all Halo games (the game series only)"
  - "The Last of Us: the games (Part I, Part II, and any The Last of Us Part III / Part 3 game news) AND the HBO show (especially The Last of Us Season 2 updates and news)"
  angles:
  - New release / launch hype or first impressions
  - Update / patch / new content drop
  - Trailer, reveal, or showcase reaction
  - Tips, builds, or hidden mechanics players miss
  - Spicy but POSITIVE hot take or ranking (a fun, confident opinion - never a complaint)
  hashtags: ["#Gaming", "#PS5", "#PCGaming", "#PinoyGamer"]   # at most 1 used per post

  prediction_hour: 9        # (legacy, unused by the engagement rotation)
  poll_hour: 15             # a gamer hot take + reply-to-vote poll
  # Same exact AAA scope, for the verdict/breakdown post (kept in sync with above).
  esports:
  - "Marvel's Spider-Man games (1 / Miles Morales / 2) + Marvel's Wolverine"
  - "Final Fantasy VII compilation only (OG, Remake, INTERmission, Rebirth, Revelation, Dirge of Cerberus, Advent Children)"
  - "Kingdom Hearts games (1, 2, 3, 4 + upcoming)"
  - "Halo (all Halo games)"
  - "The Last of Us (Part I, Part II, Part III game news, + the HBO show / Season 2)"
  # Rotating themes for the daily poll/hot-take (the agent invents its own each
  # time, guided by but NOT copying these).
  poll_domains:
  - "buy now vs wait for a sale or patch on a hyped new release"
  - "gacha economy: hoard for the guaranteed pity drop vs gamble it on the 1% banner"
  - "remake vs original: does the new version actually beat the classic"
  - "story-rich single-player vs endless live-service grind"
  - "preorder hype vs wait-for-the-reviews patience"

# Threads FOOTAGE track (separate from the caption-only Threads posts): a graded
# landscape (1920x1080) gameplay clip 'as is' + the circular KG corner logo, with
# the clip's hook as the caption, CFR 60fps. Scheduled 4x/day, interleaved with the
# caption track so the two never overlap.
# Long-form YouTube (DIRECT YouTube Data API v3, LOCAL only — multi-GB 4K HDR
# can't run in CI). Concatenates labelled 4K/60 HDR10 PART files into one full-game
# video + circular KG logo (HDR10 preserved, matching the Premiere preset),
# generates a clickbait thumbnail, then uploads + schedules. Run on your machine:
#   python run.py --youtube --parts "D:\Vids\The Last of Us 1 (Rendered)"
youtube_longform:
  enabled: true
  # STREAM-COPY concat (no re-encode): the source parts are ALREADY 4K/60 HDR10 H.264
  # High10 from the capture, so byte-copy them together — near-instant + zero quality
  # loss + HDR preserved. Re-encoding 10-bit H.264 on CPU (x264) is infeasible for a
  # multi-hour 4K/60 video (days per part). Trade-off: no lower-third overlay / audio
  # loudnorm (both need a decode+re-encode). Set false to go back to the HDR re-encode.
  stream_copy: true
  privacy: private            # 'private'+publish_at = scheduled; or 'public'/'unlisted'
  # Resumable-upload chunk size (MB). YouTube ACKs each chunk before the next sends, so
  # SMALL chunks pin throughput to chunk/ack-latency: 50 MB capped a 500 Mbps line at
  # ~19 Mbps. 512 MB (~10x per ACK) should be much faster; raise to 1024 if still slow.
  upload_chunk_mb: 512
  category_id: "20"           # 20 = Gaming
  made_for_kids: false
  logo: false                 # circular KG logo overlay — OFF (YouTube's own channel watermark covers it)
  lower_third: "reels/assets/logo/Gaming Social Lower Thirds B - Youtube - Transparent BG.mov"
  lower_third_start: 7.0      # seconds into the video the lower-third animation plays (once)
  lower_third_fade: 1.0       # fade the lower-third's last N seconds out (so it doesn't cut abruptly)
  lower_third_scale: 0.4      # scale the lower-third smaller (1.0 = full 4K frame)
  lower_third_pos: bottom-left  # full | bottom | bottom-left | bottom-right (keep it out of the action)
  audio_lufs: -14.0           # loudness-normalize the game audio to this target (YouTube ~= -14 LUFS); null = off
  graphics_pct: 0.58          # SDR-graphic brightness toward HDR graphics-white (203 nits) — calibrate
  bitrate: "63M"
  logo_size: 480              # circular KG logo diameter on the 4K frame (only if logo: true)
  default_tags: [gaming, walkthrough, playthrough, "4K", HDR, "60fps"]

# LOCAL 4K/60 HDR YouTube SHORTS track (new 2026-07-03). The channel's Shorts move
# from 1080p-via-Post-for-Me to a dedicated 4K/60 HDR track, CLASSIC <-> TRIPTYCH
# alternating, matching the long-form's HDR10 (Rec.2020 PQ) + loudnorm export exactly,
# uploaded via the YouTube Data API (core/youtube.py). HEAVY: nvenc + multi-GB HDR
# footage -> runs on YOUR machine (like --youtube long-form), NOT in CI. Footage =
# pre-extracted 4K/60 HDR reel clips per game under footage_dir/<game>/ (make them with
# tools/name_parts.py-labelled captures or by trimming the long-form parts). YouTube
# THROTTLED bulk Shorts (2026-06-26), so keep the LOCAL scheduler LOW + varied.
#   python run.py --youtube-short                 # render + upload one Short (auto layout)
#   python run.py --youtube-short --dry-run       # render only, no upload
#   python run.py --youtube-short --layout triptych --clip <file>
youtube_shorts:
  enabled: true
  game: ff7remake                         # default game for the track
  footage_dir: reels/assets/footage-4k    # holds the FILL pool: <game>-vertical/ subfolders
  # classic + triptych footage = discrete "long-form shorter clips" (each -> ONE Short, a
  # ~35s window + a lore hook). Priority-ordered; the full-game recordings are a LOCAL-ONLY
  # fallback (huge + auto-archived, so only used when a game is still on disk):
  clip_source_dirs:
    - reels/assets/4k-hdr-long-clips      # paste discrete scene clips here (primary source)
    - reels/assets/longform-fullgame      # full games (fallback, only when still local)
  # classic <-> triptych <-> fill (full-bleed vertical), alternating per post. FILL =
  # raw 4K HDR LANDSCAPE clips scaled to COVER 9:16 (pure footage, no overlay), SAME HDR
  # process as the other Shorts (loudnorm -14/384k) — only the scale differs. Paste those
  # into footage_dir/<game>-vertical/. One per-game ledger drives freshness + rotation.
  layouts: [classic, triptych, fill]
  fps: 60
  width: 2160                             # 4K vertical (2160x3840)
  height: 3840
  target_seconds_choices: [30, 35, 40]    # vary the length per Short
  privacy: public                         # public | unlisted | private
  category_id: "20"                       # 20 = Gaming
  made_for_kids: false
  tags: [ff7 remake, final fantasy vii remake, final fantasy, ff7, gaming, "4K", HDR, "60fps", ps5]

# Unified 4K/60 HDR SOURCE intake (new 2026-07-03). ONE place to paste raw 4K/60 HDR
# captures: source_dir/<game>/. These feed BOTH the long-form pillar (run.py --youtube
# --parts <folder>) AND the YouTube Shorts source (curate clips with tools/pool_4k.py).
# A SCHEDULED auto-sync (tools/archive_4k.py sync, via Windows Task Scheduler) uploads
# new files to B2 then FREES local disk (auto-delete once VERIFIED + past the grace
# window). Pin a game you're still editing with a .keep file in its folder to pause the
# auto-free. Reuses the longform_archive B2 bucket + rclone remote + .env creds below.
#   python tools/archive_4k.py sync            # upload new files (all games) + free verified
#   python tools/archive_4k.py pull <game>     # bring a game's source back local
#   python tools/archive_4k.py free <game>     # free NOW (skip the grace window)
source_4k:
  enabled: true
  source_dir: reels/assets/4k-hdr-long-clips   # paste long-form SHORTER clips per game here
  bucket_path: 4k-hdr                  # B2 path prefix (under the longform_archive bucket)
  free_after_hours: 12                 # delete a verified-local file this long after its last change (0 = as soon as verified). A .keep file in the game folder pauses freeing.
  min_settle_minutes: 2               # ignore files changed in the last N min (still copying)
  transfers: 4                        # rclone parallel transfers
  # ALSO auto-archive the YouTube FILL pool (4K HDR landscape clips for the full-bleed
  # Shorts) to B2 + free local — same grace/pin rules. run_youtube_short pulls a clip
  # back on demand if it was freed. Scans the '<game>-vertical' subfolders of this dir.
  vertical_pool_dir: reels/assets/footage-4k
  vertical_bucket_path: 4k-vertical

# Long-form 4K HDR source archive -> Backblaze B2 (frees local disk). Uses rclone.
# Push a finished game to the cloud + delete local; pull it back for more clips.
#   python tools/archive_longform.py push final-fantasy-7-remake
longform_archive:
  enabled: true
  provider: b2
  remote: kgb2                        # rclone remote name (configured from .env at runtime)
  bucket: kiwinoygamer-longform       # your B2 bucket name
  local_dir: reels/assets/longform-fullgame

threads_footage:
  enabled: true
  seconds: 60          # max clip length (longer clips are trimmed)
  fps: 60              # CFR 60fps
  # Horizontal 'as-is' footage now posts to Threads + Facebook, 2x/day (2026-07-01,
  # per user). Threads gets #GamingThreads; Facebook gets the plain hook. The
  # rotated-90° Instagram version is OFF here — that "rotated" format moved into the
  # gameplay-reel layout rotation (reels.gameplay.layouts) so IG gets it there
  # instead. Set instagram: true to bring the footage-track IG version back.
  instagram: false
  post_to: [threads, facebook]
  fb_stories: true   # also share the landscape footage to the Facebook Page Story (2026-07-02, letterboxed)
  # Reference times for the EXTERNAL cron-job.org footage job (it runs
  # `run.py --threads-footage`). 2x/day, every 12h, interleaved with the reels
  # (00/08/16) + quote cards (06/18) so FB/Threads posts stay ~2h+ apart:
  # 10:00 UTC = 6PM PHT, 22:00 UTC = 6AM PHT.
  hours: [10, 22]

# Research is web-search based: OpenAI web search for image/reel topics, Claude
# web search for Threads. (The last30days engine was removed — it surfaced stale,
# pre-announcement threads.)

# TikTok cross-post via TikTok's OWN Content Posting API (direct, no middleman /
# no subscription). The gameplay reels publish straight to TikTok; Post for Me
# still handles IG/YT/FB/Threads. Secrets (client key/secret + refresh token) are
# env-only (public repo). Toggle off to stop the TikTok cross-post.
tiktok:
  # TikTok posting route (read by orchestrator.run_gameplay_reel tiktok_only branch):
  #   postforme -> Post for Me DRAFT: full quality (60fps HDR preserved), but you PUBLISH
  #                MANUALLY in the TikTok app + paste the caption (PfM's TikTok app is
  #                unaudited so public direct-post 403s; TikTok's draft API ignores the
  #                caption). Chosen 2026-07-09 for the big quality win over Zernio.
  #   zernio    -> auto-public, captioned, but Zernio re-compresses server-side (no HDR/60fps).
  via: postforme
  zernio:
    account_id: "6a45a57f9d9472faae490d32"   # kiwinoygamer TikTok (via `python -m core.zernio accounts`)
    privacy_level: PUBLIC_TO_EVERYONE   # must be one of the account's creator-info options
    draft: false                   # false = direct auto-post; true = TikTok Creator Inbox (tap to finish)
    allow_comment: true
    allow_duet: true
    allow_stitch: true
  # --- legacy direct-app fields (unused while via: zernio) ---
  enabled: true
  redirect_uri: "https://cloudstrive6.github.io/kiwinoygamer/"  # must EXACTLY match the TikTok app's registered redirect
  privacy: "SELF_ONLY"
  disable_comment: false
  disable_duet: false
  disable_stitch: false
