brand:
  name: KiwinoyGamer
  handle: '@kiwinoygamer'
  language: English
  voice: 'High-energy gaming creator who lives and breathes gacha games and sports.
    Confident, hype, and in-the-know — talks to the audience like a friend with the
    inside scoop. Emoji-forward but never spammy. Value-first: always helps the viewer
    win, save, or look smart. Hooks hard in the first line.

    '
models:
  # Caption/beats writer. "claude_code" = your Claude subscription token (FREE),
  # "openai" = gpt-4.1 (paid), "anthropic" = Anthropic API key (paid).
  writer_provider: claude_code
  writer_openai: gpt-4.1
  writer_anthropic: claude-sonnet-4-6
  claude_model: sonnet           # model used for the free Claude Code calls
  research: gpt-4.1              # (unused now — image/reel research uses Claude)
  image: gpt-image-1            # IMAGE GENERATOR stays on OpenAI (paid)
  web_search_tool: web_search
  writer_max_tokens: 1024
schedule:
  timezone: UTC
  # 4 feed image posts/day: 2 gacha/games (FB+IG) + 2 esports (FB+IG).
  # The two sports TEXT-ONLY Facebook slots (00:00 + 16:00 UTC) were RETIRED
  # (2026-06-12) and left open to fill with something else later. Sports still
  # runs on the dedicated Threads track (16/day), which is unaffected.
  slots:
  - id: 1
    time: '04:00'
    category: gacha
  - id: 2
    time: '08:00'
    category: esports
  - id: 3
    time: '12:00'
    category: gacha
  - id: 4
    time: '20:00'
    category: esports
topics:
  # "gacha" = the games / Facebook + Instagram IMAGE rotation. Despite the key
  # name it now covers both gacha titles (anime art) AND major AAA titles (each
  # rendered in its own real art style via image.franchise_styles below).
  gacha:
    games:
    - Genshin Impact
    - 'Honkai: Star Rail'
    - NTE Neverness to Everness
    - Final Fantasy VII Revelation
    - Resident Evil Veronica
    - 'Halo: Campaign Evolved'
    angles:
    - Tier list / meta analysis — which characters or items are must-haves right now
    - Whale account / maxed-account showcase
    - F2P-friendly resource management & best-value top-up timing (Primogems / Stellar
      Jades)
    - New banner / character reveal or leak
    - Patch notes & version update breakdown
    # General AAA-game angles (for Final Fantasy / Resident Evil / Halo etc.)
    - New trailer / gameplay reveal or showcase
    - Release date / launch window news
    - Remake / remaster reveal, details & comparison
    - Character, boss or story reveal
    - Hot take, hype or community reaction to the latest news
  # Esports vertical for FB+IG IMAGE posts. Visuals are always IN-GAME heroes/
  # characters (never real pro players' faces — same rule that killed sports
  # images). Analytical, betting-adjacent content: brackets, drafts, form, meta.
  esports:
    games:
    - 'Mobile Legends: Bang Bang (MPL Philippines and M-series Worlds)'
    - Dota 2 (The International tier and major tournaments)
    - Counter-Strike 2 (tier-1 events, Majors)
    - League of Legends / Wild Rift (Worlds, MSI, regional leagues)
    # Highest-reach MLBB themes for the young Philippine audience. The research
    # agent leans toward MLBB / MPL PH over the other esports titles and, when the
    # topic is MLBB, favors these themes (fastest path to PH reach + community).
    mlbb_priorities:
    - 'National pride: PH teams at the M-series World Championship / MSC / SEA Games, Pinas vs the world'
    - 'MPL Philippines playoffs, finals, bracket reactions, and who-wins-this-series predictions'
    - 'New hero release or rework: ability breakdown, is it broken, should you buy'
    - 'New skins (Collector / Legend / event) and any anime or IP collab skins'
    - 'Hero tier list, must-ban list, and role power rankings for the current patch'
    - 'Pro builds, combos, and signature-hero highlight plays'
    - 'Roster moves and transfers (keep it hype, not drama)'
    angles:
    - MPL Philippines bracket reactions, team form and national-pride storylines
    - Draft / meta breakdowns — which heroes, champions or agents decide the series
    - '"Who wins this series" head-to-head predictions with reasoning'
    - Roster moves, transfers and team shake-ups
    - Tournament previews (International-tier, Majors, Worlds, MSI)
    - Patch-impact analysis on the competitive meta
    - Map-by-map analysis and veto predictions (CS2)
  sports:
    leagues:
    - English Premier League football
    - NFL
    - NBA
    - Major tennis (Grand Slams / ATP / WTA)
    angles:
    - Live match prediction & analysis
    - Fantasy sports insight & picks
    - Player spotlight / form & stats analysis
    - Injury, transfer & lineup news
    - Big rivalry / matchup preview
caption:
  hook_max_chars: 140
  short_body_max_lines: 5
  long_form_only_if: 'The topic is highly educational, genuinely entertaining, or
    gives real community value (a proper guide, a deep meta breakdown, a big story).
    Never pad. If long, use short line-broken paragraphs, never a dense block.

    '
