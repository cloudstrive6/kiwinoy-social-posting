  headline: 'Design a bold, short, scroll-stopping on-image headline drawn from the
    topic and caption. Maximum legibility: strong contrast, clear visual hierarchy,
    no spelling errors. CRITICAL — the lettering MUST look like it belongs in THIS
    image''s world and art style: the font, weight, texture, color and treatment of
    the headline have to match the overall aesthetic and (for a specific game) evoke
    that game''s own title/logo typography. As a baseline: athletic condensed/bold
    sans for sports; stylized anime/game-title lettering for gacha. Keep the headline
    to a few punchy words. Do NOT use em-dashes or en-dashes anywhere in the headline text.

    '
platforms:
