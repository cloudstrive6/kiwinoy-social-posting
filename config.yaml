  - '#PremierLeague'
  - '#NFL'
  - '#NBA'
  - '#Tennis'
  - '#FantasyFootball'
  - '#SportsPredictions'
image:
  size: 1024x1024
  quality: high
  styles:
    sports: 'A real-life press photograph of REAL human athletes, indistinguishable
      from an actual photo on a sports news site. Real people with believable skin,
      sweat and fabric texture. The players wear the correct team''s real-life kit,
      colors and sponsors and are in the authentic real venue that matches the story
      (e.g. the right stadium / arena). Shot on a professional DSLR with a fast
      telephoto lens: dramatic stadium / arena lighting, shallow depth of field,
      crisp frozen motion, photojournalistic realism, rich color grade. It MUST look
      like a genuine real-world photograph. Absolutely NOT illustrated, NOT cartoon,
      NOT anime, NOT a 3D render, NOT CGI, NOT a video-game screenshot.

      '
    gacha: 'High-quality anime key-visual / gacha splash-art aesthetic. Vibrant, clean
      cel-shaded characters, cinematic rim lighting and particle effects, detailed
      line work, premium mobile-game promo-art feel.

      '
    # Fallback when an esports topic doesn't match a franchise entry below.
    esports: 'Premium esports tournament key art: dramatic arena-stage atmosphere,
      stylized in-game heroes/characters as the focal subject, trophy-and-spotlight
      energy, bold broadcast-graphics finish. CRITICAL: NEVER depict real people,
      real pro players, or real human faces — represent teams and matchups ONLY
      through in-game characters, heroes, logos-free team colors and game worlds.

      '
  # Per-title art direction for the non-anime AAA games in the rotation. The matcher
  # scans the topic title/subject/angle for any keyword; first match wins. Titles
  # with no match fall back to the default `gacha` anime style above. Each `style`
  # also pins the iconic character so gpt-image-1 renders a close likeness.
  franchise_styles:
  - match: ['final fantasy', 'ff vii', 'ff7', 'ffvii', 'ff revelation', 'final fantasy revelation',
      'cloud strife', 'sephiroth', 'tifa lockhart', 'aerith']
    style: >
      Cinematic, semi-realistic JRPG key art in the Final Fantasy VII Remake /
      Rebirth aesthetic: high-detail realistic-stylized characters, dramatic
      cinematic lighting, lush high-production-value render (NOT flat anime, NOT
      cartoon). Render the iconic character as recognizably and accurately as
      possible: Cloud Strife with spiky blond hair, the dark SOLDIER 1st-class
      outfit and the oversized Buster Sword (or Sephiroth: long silver hair, long
      black coat, the Masamune katana). True to the official character design.
    headline_style: >
      Sleek, elegant title lettering with fine serifs and a subtle brushed-metal /
      silver sheen, refined and cinematic — evoking the Final Fantasy logo treatment.
    hashtags: ['#FinalFantasy', '#FF7', '#FFVII', '#FinalFantasyVII', '#JRPG', '#Gaming']
  - match: ['resident evil', 'code veronica', 'veronica', 'biohazard', 'claire redfield',
      'chris redfield', 'leon kennedy']
    style: >
      Photorealistic survival-horror cinematic in the modern Resident Evil (RE
      Engine) aesthetic: gritty, dark, tense, filmic color grade, realistic skin,
      materials and atmosphere (NOT anime, NOT cartoon). Render the iconic
      character recognizably and accurately, true to their canonical look: Claire
      Redfield (auburn hair) or Chris Redfield, in true-to-game outfit.
    headline_style: >
      Grungy, distressed horror lettering — weathered stencil or rough serif caps,
      cold and grim with a faint blood-tinged edge, like a Resident Evil title card.
    hashtags: ['#ResidentEvil', '#REVeronica', '#CodeVeronica', '#Biohazard', '#SurvivalHorror',
      '#Gaming']
  - match: ['halo', 'master chief', 'campaign evolved', 'spartan', 'cortana', 'covenant',
      'mjolnir']
    style: >
      Epic sci-fi military-shooter key art in the Halo aesthetic: cinematic,
      photoreal game-render quality (NOT anime, NOT cartoon). Render Master Chief
      recognizably and accurately: a tall super-soldier in the iconic green Mjolnir
      powered armor with a smooth gold/amber reflective visor, set against a
      dramatic alien ringworld or battlefield vista. True-to-canon armor, colors
      and proportions.
    headline_style: >
      Angular, engraved military sci-fi caps — clean hard-edged metallic sans with
      a futuristic UNSC feel, like the Halo logo.
    hashtags: ['#Halo', '#MasterChief', '#HaloCampaignEvolved', '#Xbox', '#Gaming']
  - match: ['mobile legends', 'mlbb', 'mpl philippines', 'mpl ph', 'mpl season',
      'm6 world', 'm7 world', 'moonton', 'bang bang']
    style: >
      Official Mobile Legends: Bang Bang splash-art aesthetic: glossy, vibrant,
      high-detail stylized 3D-painterly MOBA key art exactly like Moonton's hero
      splash screens — dynamic action pose, glowing skill effects, rich saturated
      colors, epic battlefield backdrop. Render the named MLBB hero(es) as
      recognizably and accurately as possible, true to their official in-game
      design (signature weapon, outfit, colors). NEVER depict real people, real
      pro players or real human faces — represent teams and matchups ONLY through
      heroes, team colors and the game world.
    headline_style: >
      Bold beveled metallic-gold MOBA lettering with a blue-and-gold energy glow,
      like the Mobile Legends: Bang Bang logo treatment.
    hashtags: ['#MLBB', '#MobileLegends', '#MPLPhilippines', '#MPL', '#Pinoy', '#PinoyGamer',
      '#Philippines']
  - match: ['dota', 'the international', 'aegis of champions', 'radiant', 'dire ']
    style: >
      Dark, painterly epic-fantasy key art in the official Dota 2 / Valve
      aesthetic: gritty brushwork, moody dramatic lighting, ancient battlefield
      atmosphere, muted palette with magical accent glows. Render the named Dota 2
      hero(es) as recognizably and accurately as possible, true to their official
      in-game design. NEVER depict real people, real pro players or real human
      faces — represent teams and matchups ONLY through heroes, the Radiant/Dire
      world and the Aegis.
    headline_style: >
      Weathered, chiseled fantasy serif caps in deep red and steel, like the
      Dota 2 logo and The International broadcast titles.
    hashtags: ['#Dota2', '#TheInternational', '#DotaEsports', '#Esports', '#Gaming']
  - match: ['counter-strike', 'counter strike', 'cs2', 'csgo', 'cs:go', 'blast premier',
      'iem ', 'pgl major', 'esl pro league', 'dust2', 'mirage', 'inferno map']
    style: >
      Photoreal tactical-shooter key art in the Counter-Strike 2 aesthetic:
      cinematic Source 2 render quality, CT and T operators in authentic tactical
      gear with helmets/balaclavas (faces obscured), iconic map environments
      (Dust2 sand walls, Mirage, Inferno), volumetric light, smoke grenades and
      muzzle flash atmosphere. NEVER depict real people, real pro players or real
      human faces — represent teams ONLY through in-game operators, map settings
      and team colors.
    headline_style: >
      Clean military stencil / hard-edged condensed sans with a tactical HUD feel,
      like the Counter-Strike 2 logo and Major broadcast graphics.
    hashtags: ['#CS2', '#CounterStrike', '#CSGO', '#Esports', '#Gaming']
  - match: ['league of legends', 'wild rift', 'lol worlds', 'league worlds', 'msi',
      'lck', 'lpl', 'lec', 'lta ', 'riot games', "summoner's rift"]
    style: >
      Official League of Legends splash-art aesthetic: painterly, high-detail
      Riot-style key art with dramatic composition, vivid magical lighting and
      cinematic depth — exactly like champion splash screens and Worlds promo art.
      Render the named champion(s) as recognizably and accurately as possible,
      true to their official splash-art design. NEVER depict real people, real pro
      players or real human faces — represent teams and matchups ONLY through
      champions, Summoner's Rift and team colors.
    headline_style: >
      Elegant engraved gold serif caps with ornate flared edges on deep navy,
      like the League of Legends logo and Worlds title treatment.
    hashtags: ['#LeagueOfLegends', '#LoLEsports', '#Worlds', '#WildRift', '#Esports',
      '#Gaming']
  headline: 'Design a bold, short, scroll-stopping on-image headline drawn from the
    topic and caption. Maximum legibility: strong contrast, clear visual hierarchy,
    no spelling errors. CRITICAL — the lettering MUST look like it belongs in THIS
    image''s world and art style: the font, weight, texture, color and treatment of
