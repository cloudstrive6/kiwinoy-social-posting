  slots:
  - id: 1
    time: '00:00'
    category: sports
  - id: 2
    time: '04:00'
    category: gacha
  - id: 3
    time: '08:00'
    category: sports
  - id: 4
    time: '12:00'
    category: gacha
  - id: 5
