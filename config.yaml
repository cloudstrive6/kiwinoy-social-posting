  - '#GenshinImpact'
  - '#HonkaiStarRail'
  - '#NTE'
  - '#NevernessToEverness'
  - '#Gacha'
  - '#GachaGames'
  - '#GachaGaming'
  sports:
  - '#EPL'
  - '#PremierLeague'
  - '#NFL'
  - '#NBA'
  - '#Tennis'
  - '#FantasyFootball'
  - '#SportsPredictions'
image:
  size: 1024x1024
  quality: high
  styles:
    sports: 'A real-life press photograph of REAL human athletes, indistinguishable
      from an actual photo on a sports news site. Real people with believable skin,
      sweat and fabric texture. The players wear the correct team''s real-life kit,
      colors and sponsors and are in the authentic real venue that matches the story
      (e.g. the right stadium / arena). Shot on a professional DSLR with a fast
      telephoto lens: dramatic stadium / arena lighting, shallow depth of field,
      crisp frozen motion, photojournalistic realism, rich color grade. It MUST look
      like a genuine real-world photograph. Absolutely NOT illustrated, NOT cartoon,
      NOT anime, NOT a 3D render, NOT CGI, NOT a video-game screenshot.

      '
    gacha: 'High-quality anime key-visual / gacha splash-art aesthetic. Vibrant, clean
      cel-shaded characters, cinematic rim lighting and particle effects, detailed
      line work, premium mobile-game promo-art feel.

      '
  headline: 'Design a bold, short, scroll-stopping on-image headline drawn from the
    topic and caption. Maximum legibility: strong contrast, clear visual hierarchy,
    no spelling errors. CRITICAL — the typography style and font feel MUST match the
    overall image style: athletic condensed/bold sans for sports; stylized anime/game-title
    lettering for gacha. Keep the headline to a few punchy words. Do NOT use em-dashes
    or en-dashes anywhere in the headline text.

    '
platforms:
