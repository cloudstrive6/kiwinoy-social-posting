name: KiwinoyGamer Threads Image Posts

# PAUSED (2026-06-14): this was the SPORTS Threads image track. Sports moved to a
# separate channel, so the daily schedule is disabled. Left as manual-only
# (workflow_dispatch) in case it's repurposed for game images later.
on:
  # schedule:                # sports image posts retired
  #   - cron: "25 16 * * *"
  #   - cron: "25 0 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (design but no publish)? true/false"
        required: false
        default: "false"

concurrency:
  group: kiwinoy-threads-image
  cancel-in-progress: false

jobs:
  threads-image:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      POSTFORME_API_KEY: ${{ secrets.POSTFORME_API_KEY }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: reels/package-lock.json

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Claude Code CLI (research + caption + fact-check + vision)
        run: npm install -g @anthropic-ai/claude-code

      - name: Ensure ffmpeg (frame grabbing)
        run: |
          if ! command -v ffmpeg >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y ffmpeg
          fi

      - name: Install Remotion (designed image rendering)
        working-directory: reels
        run: |
          npm install
          npx remotion browser ensure

      - name: Post a designed Threads image
        run: |
          DRY=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then DRY="--dry-run"; fi
          python run.py --threads-image $DRY

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: threads-image-${{ github.run_id }}
          path: output/
          retention-days: 14
          if-no-files-found: ignore
