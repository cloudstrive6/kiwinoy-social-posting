name: KiwinoyGamer Auto-Reels

# Renders + publishes 4 Taglish GAME reels per day (gameplay-only + commentary),
# all timed to Philippine peak scroll windows (PHT = UTC+8). MLBB/esports hype
# reels were retired (moved to a separate channel). These are footage-driven and
# SKIP until you've uploaded game footage.
#   06:25 UTC = 2:25 PM   -> slot 1 (Gameplay-only)
#   16:25 UTC = 12:25 AM  -> slot 2 (Gameplay-only)
#   11:25 UTC = 7:25 PM   -> slot 3 (Commentary, short)
#   02:25 UTC = 10:25 AM  -> slot 4 (Commentary, long)
on:
  schedule:
    # :25 past, not :00 — GitHub heavily delays/drops top-of-hour schedules.
    - cron: "25 6 * * *"   # slot 1 (Gameplay-only)
    - cron: "25 16 * * *"  # slot 2 (Gameplay-only)
    - cron: "25 11 * * *"  # slot 3 (Commentary, short)
    - cron: "25 2 * * *"   # slot 4 (Commentary, long)
  workflow_dispatch:
    inputs:
      slot:
        description: "Reel slot id to run (1-4)"
        required: true
        default: "1"
      dry_run:
        description: "Dry run (render but no publish)? true/false"
        required: false
        default: "false"

concurrency:
  group: kiwinoy-auto-reels
  cancel-in-progress: false

jobs:
  reel:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # Research, caption + fact-check run on the Claude subscription token (free);
      # ANTHROPIC_API_KEY is the fallback; OpenAI is only for the image generator.
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      POSTFORME_API_KEY: ${{ secrets.POSTFORME_API_KEY }}
      # Optional: AI Taglish voiceover. Reels render music-only if this is unset.
      ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
      # Lets the renderer pull large clips from the 'footage' GitHub Release.
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: reels/package-lock.json

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install ffmpeg + fonts (gameplay / commentary reels)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Install Claude Code CLI (research + caption + fact-check)
        run: npm install -g @anthropic-ai/claude-code

      - name: Install reel renderer (Remotion)
        working-directory: reels
        run: |
          npm install
          npx remotion browser ensure

      - name: Map trigger -> reel slot
        id: pick
        run: |
          case "${{ github.event.schedule }}" in
            "25 6 * * *")  SLOT=1 ;;
            "25 16 * * *") SLOT=2 ;;
            "25 11 * * *") SLOT=3 ;;
            "25 2 * * *")  SLOT=4 ;;
            *)             SLOT="${{ github.event.inputs.slot }}" ;;
          esac
          echo "slot=${SLOT:-1}" >> "$GITHUB_OUTPUT"
          echo "Selected reel slot: ${SLOT:-1}"

      - name: Render + publish the reel
        run: |
          DRY=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then DRY="--dry-run"; fi
          python run.py --reel --slot ${{ steps.pick.outputs.slot }} $DRY

      - name: Poster frames (dry-run layout preview)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        continue-on-error: true
        run: |
          f=$(ls -t output/*/reel.mp4 2>/dev/null | head -1)
          if [ -n "$f" ]; then
            d=$(dirname "$f")
            for t in 2 8 20 45; do
              ffmpeg -y -ss "$t" -i "$f" -frames:v 1 "$d/preview_${t}s.png" 2>/dev/null || true
            done
            echo "Poster frames written next to $f"
          fi

      - name: Upload run artifacts (brief, caption, beats, mp4)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reel-output-slot-${{ steps.pick.outputs.slot }}-${{ github.run_id }}
          path: output/
          retention-days: 14
          if-no-files-found: ignore
