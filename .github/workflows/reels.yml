name: KiwinoyGamer Auto-Reels

# Renders + publishes one GACHA reel per day at 18:00 UTC. (Sports reels stopped.)
on:
  schedule:
    - cron: "0 18 * * *"   # 18:00 UTC -> reel slot 1 (Gacha)
  workflow_dispatch:
    inputs:
      slot:
        description: "Reel slot id to run (1)"
        required: true
        default: "1"
      dry_run:
        description: "Dry run (render but no publish)? true/false"
        required: false
        default: "false"

concurrency:
  group: kiwinoy-auto-reels
  cancel-in-progress: false

jobs:
  reel:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      # Research, caption + fact-check run on the Claude subscription token (free);
      # ANTHROPIC_API_KEY is the fallback; OpenAI is only for the image generator.
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      POSTFORME_API_KEY: ${{ secrets.POSTFORME_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: reels/package-lock.json

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Claude Code CLI (research + caption + fact-check)
        run: npm install -g @anthropic-ai/claude-code

      - name: Install reel renderer (Remotion)
        working-directory: reels
        run: |
          npm install
          npx remotion browser ensure

      - name: Map trigger -> reel slot
        id: pick
        run: |
          case "${{ github.event.schedule }}" in
            "0 18 * * *") SLOT=1 ;;
            *)            SLOT="${{ github.event.inputs.slot }}" ;;
          esac
          echo "slot=${SLOT:-1}" >> "$GITHUB_OUTPUT"
          echo "Selected reel slot: ${SLOT:-1}"

      - name: Render + publish the reel
        run: |
          DRY=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then DRY="--dry-run"; fi
          python run.py --reel --slot ${{ steps.pick.outputs.slot }} $DRY

      - name: Upload run artifacts (brief, caption, beats, mp4)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reel-output-slot-${{ steps.pick.outputs.slot }}-${{ github.run_id }}
          path: output/
          retention-days: 14
          if-no-files-found: ignore
