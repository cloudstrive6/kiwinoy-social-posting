name: KiwinoyGamer Auto-Reels

# Renders + publishes 4 Taglish reels per day, all timed to Philippine peak
# scroll windows (PHT = UTC+8):
#   04:25 UTC = 12:25 PM (lunch)  -> slot 1 (Esports, MLBB)
#   10:25 UTC = 6:25 PM           -> slot 2 (Esports, MLBB)
#   13:25 UTC = 9:25 PM (prime)   -> slot 3 (Esports, MLBB)
#   15:25 UTC = 11:25 PM (late)   -> slot 4 (Esports, MLBB)
on:
  schedule:
    # :25 past, not :00 — GitHub heavily delays/drops top-of-hour schedules.
    - cron: "25 4 * * *"   # slot 1 (Hype, MLBB)
    - cron: "25 10 * * *"  # slot 2 (Hype, MLBB)
    - cron: "25 13 * * *"  # slot 3 (Hype, MLBB)
    - cron: "25 15 * * *"  # slot 4 (Hype, MLBB)
    - cron: "25 6 * * *"   # slot 5 (Gameplay-only)
    - cron: "25 16 * * *"  # slot 6 (Gameplay-only)
    - cron: "25 11 * * *"  # slot 7 (Commentary, short)
    - cron: "25 2 * * *"   # slot 8 (Commentary, long)
  workflow_dispatch:
    inputs:
      slot:
        description: "Reel slot id to run (1-8)"
        required: true
        default: "1"
      dry_run:
        description: "Dry run (render but no publish)? true/false"
        required: false
        default: "false"

concurrency:
  group: kiwinoy-auto-reels
  cancel-in-progress: false

jobs:
  reel:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # Research, caption + fact-check run on the Claude subscription token (free);
      # ANTHROPIC_API_KEY is the fallback; OpenAI is only for the image generator.
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      POSTFORME_API_KEY: ${{ secrets.POSTFORME_API_KEY }}
      # Optional: AI Taglish voiceover. Reels render music-only if this is unset.
      ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
      # Lets the renderer pull large clips from the 'footage' GitHub Release.
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: reels/package-lock.json

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install ffmpeg + fonts (gameplay / commentary reels)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Install Claude Code CLI (research + caption + fact-check)
        run: npm install -g @anthropic-ai/claude-code

      - name: Install reel renderer (Remotion)
        working-directory: reels
        run: |
          npm install
          npx remotion browser ensure

      - name: Map trigger -> reel slot
        id: pick
        run: |
          case "${{ github.event.schedule }}" in
            "25 4 * * *")  SLOT=1 ;;
            "25 10 * * *") SLOT=2 ;;
            "25 13 * * *") SLOT=3 ;;
            "25 15 * * *") SLOT=4 ;;
            "25 6 * * *")  SLOT=5 ;;
            "25 16 * * *") SLOT=6 ;;
            "25 11 * * *") SLOT=7 ;;
            "25 2 * * *")  SLOT=8 ;;
            *)             SLOT="${{ github.event.inputs.slot }}" ;;
          esac
          echo "slot=${SLOT:-1}" >> "$GITHUB_OUTPUT"
          echo "Selected reel slot: ${SLOT:-1}"

      - name: Render + publish the reel
        run: |
          DRY=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then DRY="--dry-run"; fi
          python run.py --reel --slot ${{ steps.pick.outputs.slot }} $DRY

      - name: Upload run artifacts (brief, caption, beats, mp4)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reel-output-slot-${{ steps.pick.outputs.slot }}-${{ github.run_id }}
          path: output/
          retention-days: 14
          if-no-files-found: ignore
