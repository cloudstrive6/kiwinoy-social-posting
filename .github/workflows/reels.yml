name: KiwinoyGamer Auto-Reels

# Renders + publishes 6 GAMEPLAY reels per day, spread evenly (every 4 hours).
# Footage-driven (Spider-Man etc.); each SKIPS if no footage. (PHT = UTC+8.)
#   00:25 UTC = 8:25 AM   -> slot 1
#   04:25 UTC = 12:25 PM  -> slot 2
#   08:25 UTC = 4:25 PM   -> slot 3
#   12:25 UTC = 8:25 PM   -> slot 4
#   16:25 UTC = 12:25 AM  -> slot 5
#   20:25 UTC = 4:25 AM   -> slot 6
on:
  # NOTE: GitHub's native `schedule:` cron silently DROPS/DELAYS runs (we saw 8h
  # and 13h gaps), so the reels are now triggered by an EXTERNAL scheduler
  # (cron-job.org job "KiwinoyGamer Reels (6/day, every 4h)") that POSTs to this
  # workflow's dispatch API every 4h at :25 UTC with {"inputs":{"slot":"1"}} —
  # the same reliable approach as the Threads track. Schedule left here, disabled,
  # for reference / quick rollback. Do NOT re-enable it alongside cron-job.org or
  # reels will double-post.
  # schedule:
  #   - cron: "25 0 * * *"   # slot 1
  #   - cron: "25 4 * * *"   # slot 2
  #   - cron: "25 8 * * *"   # slot 3
  #   - cron: "25 12 * * *"  # slot 4
  #   - cron: "25 16 * * *"  # slot 5
  #   - cron: "25 20 * * *"  # slot 6
  workflow_dispatch:
    inputs:
      slot:
        description: "Reel slot id to run (1-6)"
        required: true
        default: "1"
      dry_run:
        description: "Dry run (render but no publish)? true/false"
        required: false
        default: "false"

concurrency:
  group: kiwinoy-auto-reels
  cancel-in-progress: false

# The renderer records which footage clip it used (a tiny JSON asset on the
# 'footage' release) so the next reel picks fresh footage — needs write access.
permissions:
  contents: write

jobs:
  reel:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # Research, caption + fact-check run on the Claude subscription token (free);
      # ANTHROPIC_API_KEY is the fallback; OpenAI is only for the image generator.
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      POSTFORME_API_KEY: ${{ secrets.POSTFORME_API_KEY }}
      # Optional: AI Taglish voiceover. Reels render music-only if this is unset.
      ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
      # Lets the renderer pull large clips from the 'footage' GitHub Release.
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: reels/package-lock.json

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install ffmpeg + fonts (gameplay / commentary reels)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Install Claude Code CLI (research + caption + fact-check)
        run: npm install -g @anthropic-ai/claude-code

      - name: Install reel renderer (Remotion)
        working-directory: reels
        run: |
          npm install
          npx remotion browser ensure

      - name: Map trigger -> reel slot
        id: pick
        run: |
          case "${{ github.event.schedule }}" in
            "25 0 * * *")  SLOT=1 ;;
            "25 4 * * *")  SLOT=2 ;;
            "25 8 * * *")  SLOT=3 ;;
            "25 12 * * *") SLOT=4 ;;
            "25 16 * * *") SLOT=5 ;;
            "25 20 * * *") SLOT=6 ;;
            *)             SLOT="${{ github.event.inputs.slot }}" ;;
          esac
          echo "slot=${SLOT:-1}" >> "$GITHUB_OUTPUT"
          echo "Selected reel slot: ${SLOT:-1}"

      - name: Render + publish the reel
        run: |
          DRY=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then DRY="--dry-run"; fi
          python run.py --reel --slot ${{ steps.pick.outputs.slot }} $DRY

      - name: Poster frames (dry-run layout preview)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        continue-on-error: true
        run: |
          f=$(ls -t output/*/reel.mp4 2>/dev/null | head -1)
          if [ -n "$f" ]; then
            d=$(dirname "$f")
            for t in 2 8 20 45; do
              ffmpeg -y -ss "$t" -i "$f" -frames:v 1 "$d/preview_${t}s.png" 2>/dev/null || true
            done
            echo "Poster frames written next to $f"
          fi

      - name: Upload run artifacts (brief, caption, beats, mp4)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reel-output-slot-${{ steps.pick.outputs.slot }}-${{ github.run_id }}
          path: output/
          retention-days: 14
          if-no-files-found: ignore
