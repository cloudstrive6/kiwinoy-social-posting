name: KiwinoyGamer Auto-Post

# Runs the social posting team 4x/day on a cron (UTC). Each cron maps to a slot.
# Alternates Gacha -> Sports -> Gacha -> Sports.
on:
  schedule:
    - cron: "0 12 * * *"   # 12:00 UTC -> slot 1 (Gacha)
    - cron: "0 16 * * *"   # 16:00 UTC -> slot 2 (Sports)
    - cron: "0 20 * * *"   # 20:00 UTC -> slot 3 (Gacha)
    - cron: "0 0 * * *"    # 00:00 UTC -> slot 4 (Sports)
  workflow_dispatch:        # lets you trigger a run by hand from the Actions tab
    inputs:
      slot:
        description: "Slot id to run (1-4)"
        required: true
        default: "1"
      dry_run:
        description: "Dry run (no publish)? true/false"
        required: false
        default: "false"

concurrency:
  group: kiwinoy-auto-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      POSTFORME_API_KEY: ${{ secrets.POSTFORME_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Map trigger -> slot
        id: pick
        run: |
          case "${{ github.event.schedule }}" in
            "0 12 * * *") SLOT=1 ;;
            "0 16 * * *") SLOT=2 ;;
            "0 20 * * *") SLOT=3 ;;
            "0 0 * * *")  SLOT=4 ;;
            *)            SLOT="${{ github.event.inputs.slot }}" ;;
          esac
          echo "slot=${SLOT:-1}" >> "$GITHUB_OUTPUT"
          echo "Selected slot: ${SLOT:-1}"

      - name: Run the posting team
        run: |
          DRY=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then DRY="--dry-run"; fi
          python run.py --slot ${{ steps.pick.outputs.slot }} $DRY

      - name: Upload run artifacts (briefs, captions, images)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-output-slot-${{ steps.pick.outputs.slot }}-${{ github.run_id }}
          path: output/
          retention-days: 14
          if-no-files-found: ignore
