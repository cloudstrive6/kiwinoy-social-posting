name: KiwinoyGamer Auto-Post

# Runs the social posting team 6x/day on a cron (UTC). Each cron maps to a slot.
# Alternates Gacha -> Sports -> Gacha -> Sports.
on:
  schedule:
    # :25 past, not :00 — GitHub heavily delays/drops top-of-hour schedules.
    - cron: "25 0 * * *"   # 00:25 UTC -> slot 1 (Sports)
    - cron: "25 4 * * *"   # 04:25 UTC -> slot 2 (Gacha)
    - cron: "25 8 * * *"   # 08:25 UTC -> slot 3 (Sports)
    - cron: "25 12 * * *"  # 12:25 UTC -> slot 4 (Gacha)
    - cron: "25 16 * * *"  # 16:25 UTC -> slot 5 (Sports)
    - cron: "25 20 * * *"  # 20:25 UTC -> slot 6 (Gacha)
  workflow_dispatch:        # lets you trigger a run by hand from the Actions tab
    inputs:
      slot:
        description: "Slot id to run (1-6). Leave blank to auto-pick by time."
        required: false
        default: ""
      dry_run:
        description: "Dry run (no publish)? true/false"
        required: false
        default: "false"

concurrency:
  group: kiwinoy-auto-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Research, caption + fact-check run on the Claude subscription token (free);
      # ANTHROPIC_API_KEY is the fallback; OpenAI is only for the image generator.
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      POSTFORME_API_KEY: ${{ secrets.POSTFORME_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Claude Code CLI (research + caption + fact-check)
        run: npm install -g @anthropic-ai/claude-code

      - name: Map trigger -> slot
        id: pick
        run: |
          case "${{ github.event.schedule }}" in
            "25 0 * * *")  SLOT=1 ;;
            "25 4 * * *")  SLOT=2 ;;
            "25 8 * * *")  SLOT=3 ;;
            "25 12 * * *") SLOT=4 ;;
            "25 16 * * *") SLOT=5 ;;
            "25 20 * * *") SLOT=6 ;;
            *)             SLOT="${{ github.event.inputs.slot }}" ;;
          esac
          echo "slot=${SLOT}" >> "$GITHUB_OUTPUT"
          echo "Selected slot: ${SLOT:-(auto by time)}"

      - name: Run the posting team
        run: |
          DRY=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then DRY="--dry-run"; fi
          # No slot (external trigger / blank manual input) -> auto-pick by time.
          if [ -n "${{ steps.pick.outputs.slot }}" ]; then
            python run.py --slot ${{ steps.pick.outputs.slot }} $DRY
          else
            python run.py --auto $DRY
          fi

      - name: Upload run artifacts (briefs, captions, images)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-output-slot-${{ steps.pick.outputs.slot }}-${{ github.run_id }}
          path: output/
          retention-days: 14
          if-no-files-found: ignore
