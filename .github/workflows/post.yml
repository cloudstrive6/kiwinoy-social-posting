name: KiwinoyGamer Auto-Post

# Runs the social posting team 2x/day on a cron (UTC). Each cron maps to a slot.
# GAMES-ONLY: both feed slots are the games rotation (curated/footage-only).
# Esports + sports moved to a separate channel. These SKIP when no game media.
on:
  schedule:
    # :25 past, not :00 — GitHub heavily delays/drops top-of-hour schedules.
    - cron: "25 8 * * *"   # 08:25 UTC = 4:25 PM PHT -> slot 1 (Games)
    - cron: "25 20 * * *"  # 20:25 UTC = 4:25 AM PHT -> slot 2 (Games)
  workflow_dispatch:        # lets you trigger a run by hand from the Actions tab
    inputs:
      slot:
        description: "Slot id to run (1-2). Leave blank to auto-pick by time."
        required: false
        default: ""
      dry_run:
        description: "Dry run (no publish)? true/false"
        required: false
        default: "false"

concurrency:
  group: kiwinoy-auto-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Research, caption + fact-check run on the Claude subscription token (free);
      # ANTHROPIC_API_KEY is the fallback; OpenAI is only for the image generator.
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      POSTFORME_API_KEY: ${{ secrets.POSTFORME_API_KEY }}
      # Lets designed posts pull footage clips from the 'footage' GitHub Release.
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: reels/package-lock.json

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Claude Code CLI (research + caption + fact-check)
        run: npm install -g @anthropic-ai/claude-code

      - name: Ensure ffmpeg (frame grabbing)
        run: |
          if ! command -v ffmpeg >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y ffmpeg
          fi

      - name: Install Remotion (designed image rendering)
        working-directory: reels
        run: |
          npm install
          npx remotion browser ensure

      - name: Map trigger -> slot
        id: pick
        run: |
          case "${{ github.event.schedule }}" in
            "25 8 * * *")  SLOT=1 ;;
            "25 20 * * *") SLOT=2 ;;
            *)             SLOT="${{ github.event.inputs.slot }}" ;;
          esac
          echo "slot=${SLOT}" >> "$GITHUB_OUTPUT"
          echo "Selected slot: ${SLOT:-(auto by time)}"

      - name: Run the posting team
        run: |
          DRY=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then DRY="--dry-run"; fi
          # No slot (external trigger / blank manual input) -> auto-pick by time.
          if [ -n "${{ steps.pick.outputs.slot }}" ]; then
            python run.py --slot ${{ steps.pick.outputs.slot }} $DRY
          else
            python run.py --auto $DRY
          fi

      - name: Upload run artifacts (briefs, captions, images)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-output-slot-${{ steps.pick.outputs.slot }}-${{ github.run_id }}
          path: output/
          retention-days: 14
          if-no-files-found: ignore
