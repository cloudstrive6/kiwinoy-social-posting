name: KiwinoyGamer Ready-Reels Poster

# Posts YOUR OWN finished reels from the 'ready-reels' Release queue to
# Facebook + Instagram + Threads + YouTube (NOT X). Each run posts the oldest
# queued reel (caption + hashtags from its filename) and removes it. If the
# queue is empty it just exits. Queue reels with `python tools/ready_reels.py`.
on:
  schedule:
    # :25 past, not :00 — GitHub delays/drops top-of-hour schedules.
    - cron: "25 5 * * *"   # slots throughout the day; each posts ONE queued reel
    - cron: "25 9 * * *"
    - cron: "25 14 * * *"
    - cron: "25 19 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (pick next + show caption, do NOT post)? true/false"
        required: false
        default: "false"

concurrency:
  group: kiwinoy-ready-reels
  cancel-in-progress: false

jobs:
  ready-reel:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      POSTFORME_API_KEY: ${{ secrets.POSTFORME_API_KEY }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Post the next queued reel
        run: |
          DRY=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then DRY="--dry-run"; fi
          python run.py --ready-reel $DRY

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ready-reel-${{ github.run_id }}
          path: output/
          retention-days: 7
          if-no-files-found: ignore
