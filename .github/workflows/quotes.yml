name: KiwinoyGamer Auto-Quote-Cards

# Motivational QUOTE CARDS (FB + IG + Threads/X + a YouTube short): an original
# English quote rendered (Pillow) over a gameplay photo, 4x/day. Each day mixes
# 2 GAMEPLAY-themed + 2 LIFE-in-general quotes; a date-keyed ledger on the Release
# balances the mix, so the theme input can stay 'auto' on every trigger.
#
# Triggered by an EXTERNAL scheduler (cron-job.org job "KiwinoyGamer Quote Cards")
# 4x/day at Philippine prime times, same reliable approach as the other tracks.
on:
  # BACKUP safety-net (native schedule, ~30 min after each cron-job.org slot): runs
  # run.py --quote --backup, which posts a make-up ONLY if the primary quote card was
  # dropped (idempotent via the 'quotes' last-posted marker) and Telegrams on a catch.
  # GitHub's own scheduler is immune to the cron-job.org->dispatch 503 that drops posts.
  schedule:
    - cron: "30 6,18 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (render but do not publish)? true/false"
        required: false
        default: "false"
      theme:
        description: "Quote theme: auto | gameplay | life (auto = ledger balances 2+2/day)"
        required: false
        default: "auto"
      schedule_at:
        description: "Optional ISO time to schedule publish (e.g. 2026-06-19T04:30:00Z); empty = now"
        required: false
        default: ""

concurrency:
  group: kiwinoy-auto-quotes
  cancel-in-progress: false

permissions:
  contents: write   # may pull a footage frame as a backdrop (reads the release)

jobs:
  quote:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      POSTFORME_API_KEY: ${{ secrets.POSTFORME_API_KEY }}
      B2_KEY_ID: ${{ secrets.B2_KEY_ID }}                   # read gameplay footage from Backblaze B2
      B2_APP_KEY: ${{ secrets.B2_APP_KEY }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install fonts (premium quote typeface) + ffmpeg (footage fallback)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-dejavu-core ffmpeg
          # premium typefaces for the quote cards (|| true: skip if unavailable)
          sudo apt-get install -y fonts-montserrat || true
          sudo apt-get install -y fonts-open-sans || true
          sudo apt-get install -y fonts-roboto || true

      - name: Install Claude Code CLI (quote writer / fact-check)
        run: npm install -g @anthropic-ai/claude-code

      - name: Render + publish the quote card
        run: |
          DRY=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then DRY="--dry-run"; fi
          BACKUP=""
          if [ "${{ github.event.schedule }}" = "30 6,18 * * *" ]; then BACKUP="--backup"; fi
          THEME="${{ github.event.inputs.theme }}"
          SCHED="${{ github.event.inputs.schedule_at }}"
          SCHEDARG=""
          if [ -n "$SCHED" ]; then SCHEDARG="--schedule-at $SCHED"; fi
          python run.py --quote --quote-theme "${THEME:-auto}" $SCHEDARG $DRY $BACKUP
