name: KiwinoyGamer Auto-Quote-Cards

# Motivational gaming QUOTE CARDS to Facebook: an original English quote rendered
# (Pillow) over a gameplay photo from the image asset folders, 3x/day. The same
# quote style also feeds the Threads/X track (~60% of those posts).
#
# Triggered by an EXTERNAL scheduler (cron-job.org job "KiwinoyGamer Quote Cards")
# 3x/day at Philippine prime times, same reliable approach as the other tracks.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (render but do not publish)? true/false"
        required: false
        default: "false"

concurrency:
  group: kiwinoy-auto-quotes
  cancel-in-progress: false

permissions:
  contents: write   # may pull a footage frame as a backdrop (reads the release)

jobs:
  quote:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      POSTFORME_API_KEY: ${{ secrets.POSTFORME_API_KEY }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install fonts (premium quote typeface) + ffmpeg (footage fallback)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-dejavu-core ffmpeg
          # premium typefaces for the quote cards (|| true: skip if unavailable)
          sudo apt-get install -y fonts-montserrat || true
          sudo apt-get install -y fonts-open-sans || true
          sudo apt-get install -y fonts-roboto || true

      - name: Install Claude Code CLI (quote writer / fact-check)
        run: npm install -g @anthropic-ai/claude-code

      - name: Render + publish the quote card
        run: |
          DRY=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then DRY="--dry-run"; fi
          python run.py --quote $DRY
