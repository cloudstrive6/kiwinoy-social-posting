name: KiwinoyGamer Auto-Threads

# Dedicated Threads text track: a GAMES post every 2 hours (UTC), researched +
# written by Claude via your subscription (CLAUDE_CODE_OAUTH_TOKEN). Text only,
# <=280 chars (fits X + Threads). No images/reels. Posts to Threads AND X/Twitter.
on:
  # Triggered by an EXTERNAL scheduler (cron-job.org) hitting the workflow_dispatch
  # API every 2 hours at :25 UTC — GitHub's own `schedule:` cron dropped/delayed
  # runs, so it was removed in favour of the reliable external trigger.
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (write but do not publish)? true/false"
        required: false
        default: "false"

concurrency:
  group: kiwinoy-auto-threads
  cancel-in-progress: false

jobs:
  threads:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # higher: footage hours render + upload a video
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}   # fallback if token expires
      POSTFORME_API_KEY: ${{ secrets.POSTFORME_API_KEY }}
      B2_KEY_ID: ${{ secrets.B2_KEY_ID }}                   # read gameplay footage from Backblaze B2
      B2_APP_KEY: ${{ secrets.B2_APP_KEY }}
      GH_TOKEN: ${{ github.token }}                         # download footage from the Release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install ffmpeg + fonts (footage hours render a landscape clip)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Research + write + publish the Threads post
        run: |
          DRY=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then DRY="--dry-run"; fi
          python run.py --threads $DRY

      - name: Upload run artifacts (brief, post text)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: threads-output-${{ github.run_id }}
          path: output/
          retention-days: 14
          if-no-files-found: ignore
