name: KiwinoyGamer TikTok (TLOU2)

# Dedicated TikTok track: 3 gameplay reels/day (Spider-Man 2), alternating classic
# <-> triptych, 1080p rendered on the CI runner, posted ONLY to TikTok as Post for Me
# DRAFTS (config tiktok.via: postforme; publish manually in-app). Separate from the
# multi-game FB/IG/Threads/YT reels.
#
# Triggered by an EXTERNAL scheduler (cron-job.org), same as the other tracks —
# GitHub's native `schedule:` cron drops/delays runs. Set THREE daily jobs in
# cron-job.org (TIMEZONE = Pacific/Auckland so it tracks NZ DST) that POST to this
# workflow's dispatch API, EQUALLY SPACED every 8h:
#   07:00 NZ   15:00 NZ   23:00 NZ   (23:00 + 07:00 hit the ~10pm-7am peak; 15:00 is
#   the compromise slot given equal spacing must land one near the midday lull).
# Raised 2->3/day 2026-07-14. NOTE: each post is a MANUAL-publish PfM draft; TikTok
# rejects a 6th PENDING share in 24h, so keep the draft inbox published down to <=4.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (render but no publish)? true/false"
        required: false
        default: "false"

concurrency:
  group: kiwinoy-tiktok
  cancel-in-progress: false

# The renderer records which footage clip it used (a JSON asset on the 'footage'
# release) so the next post picks fresh footage — needs write access.
permissions:
  contents: write

jobs:
  tiktok:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # Caption/hook run on the Claude subscription token (free); ANTHROPIC is the
      # fallback, OpenAI after that. TikTok now publishes via Post for Me DRAFTS
      # (config tiktok.via: postforme) — needs POSTFORME_API_KEY; ZERNIO kept as fallback.
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      # Required for the TikTok DRAFT post (PfM) — unset -> renders but SKIPS the post.
      POSTFORME_API_KEY: ${{ secrets.POSTFORME_API_KEY }}
      ZERNIO_API_KEY: ${{ secrets.ZERNIO_API_KEY }}
      # Telegram: DM the draft's caption+hashtags to the user (copy-paste on their phone).
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      # Lets the renderer pull the clips from the 'footage' GitHub Release.
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install ffmpeg + fonts (gameplay reel render)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Install Claude Code CLI (caption + hook)
        run: npm install -g @anthropic-ai/claude-code

      - name: Render + publish the TLOU2 TikTok reel
        run: |
          DRY=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then DRY="--dry-run"; fi
          python run.py --tiktok $DRY

      - name: Upload run artifacts (brief, caption, mp4)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tiktok-output-${{ github.run_id }}
          path: output/
          retention-days: 14
          if-no-files-found: ignore
