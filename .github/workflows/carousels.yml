name: KiwinoyGamer Auto-Carousels

# Publishes a 3-5 image carousel to Facebook + Instagram twice a day.
# 13:25 UTC = 21:25 Philippines prime time -> Esports (MPL audience)
# 22:25 UTC = 18:25 US Eastern evening    -> Gacha / games
on:
  schedule:
    # :25 past, not :00 — GitHub heavily delays/drops top-of-hour schedules.
    - cron: "25 13 * * *"  # 13:25 UTC -> carousel slot 1 (Esports)
    - cron: "25 22 * * *"  # 22:25 UTC -> carousel slot 2 (Gacha)
  workflow_dispatch:
    inputs:
      slot:
        description: "Carousel slot id (1-2). Leave blank to auto-pick by time."
        required: false
        default: ""
      dry_run:
        description: "Dry run (build slides but no publish)? true/false"
        required: false
        default: "false"

concurrency:
  group: kiwinoy-auto-carousels
  cancel-in-progress: false

jobs:
  carousel:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      # Research, caption + fact-check run on the Claude subscription token (free);
      # ANTHROPIC_API_KEY is the fallback; OpenAI is only for the image generator.
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      POSTFORME_API_KEY: ${{ secrets.POSTFORME_API_KEY }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: reels/package-lock.json

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Claude Code CLI (research + caption + fact-check)
        run: npm install -g @anthropic-ai/claude-code

      - name: Ensure ffmpeg (frame grabbing)
        run: |
          if ! command -v ffmpeg >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y ffmpeg
          fi

      - name: Install Remotion (designed image rendering)
        working-directory: reels
        run: |
          npm install
          npx remotion browser ensure

      - name: Map trigger -> carousel slot
        id: pick
        run: |
          case "${{ github.event.schedule }}" in
            "25 13 * * *") SLOT=1 ;;
            "25 22 * * *") SLOT=2 ;;
            *)             SLOT="${{ github.event.inputs.slot }}" ;;
          esac
          echo "slot=${SLOT}" >> "$GITHUB_OUTPUT"
          echo "Selected carousel slot: ${SLOT:-(auto by time)}"

      - name: Build + publish the carousel
        run: |
          DRY=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then DRY="--dry-run"; fi
          if [ -n "${{ steps.pick.outputs.slot }}" ]; then
            python run.py --carousel --slot ${{ steps.pick.outputs.slot }} $DRY
          else
            python run.py --carousel --auto $DRY
          fi

      - name: Upload run artifacts (brief, caption, slides)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: carousel-output-slot-${{ steps.pick.outputs.slot }}-${{ github.run_id }}
          path: output/
          retention-days: 14
          if-no-files-found: ignore
